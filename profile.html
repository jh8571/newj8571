<!DOCTYPE html>
<html lang="ko">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-P6CTZY2283"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-P6CTZY2283');</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 프로필 — VitalGuide</title>
    <meta name="robots" content="noindex">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <style>
        .profile-wrap { max-width: 860px; margin: 0 auto; padding-bottom: 60px; }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; margin-bottom: 24px; }
        .stat-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 18px; padding: 20px 16px; text-align: center; }
        .stat-card .sv { font-size: 2rem; font-weight: 900; line-height: 1; margin-bottom: 6px; }
        .stat-card .sl { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); letter-spacing: 0.05em; }
        .section-label { font-size: 0.75rem; font-weight: 800; color: var(--text-muted); letter-spacing: 0.07em; text-transform: uppercase; margin: 30px 0 14px; }
        .result-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
        .result-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 18px; }
        .result-card .rc-label { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; }
        .result-card .rc-val { font-size: 1rem; font-weight: 900; }
        .result-card .rc-date { font-size: 0.72rem; color: var(--text-muted); margin-top: 4px; }
        .game-row { display: flex; align-items: center; gap: 14px; padding: 14px 16px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 14px; margin-bottom: 10px; }
        .game-row .gr-icon { font-size: 1.6rem; flex-shrink: 0; }
        .game-row .gr-name { font-size: 0.9rem; font-weight: 800; flex: 1; }
        .game-row .gr-score { font-size: 1.1rem; font-weight: 900; color: var(--accent-color); }
        .log-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--border-color); font-size: 0.87rem; }
        .log-item:last-child { border-bottom: none; }
        .log-xp { background: rgba(16,185,129,0.12); color: #059669; padding: 2px 10px; border-radius: 99px; font-size: 0.78rem; font-weight: 800; white-space: nowrap; }
        .xp-bar-wrap { height: 10px; background: var(--border-color); border-radius: 99px; overflow: hidden; margin: 10px 0; }
        .xp-bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(to right, var(--accent-color), #818cf8); transition: width 0.8s ease; }
        .not-logged { text-align: center; padding: 80px 20px; }
        .not-logged h2 { font-size: 1.6rem; font-weight: 900; margin-bottom: 12px; }
        .not-logged p { color: var(--text-muted); margin-bottom: 28px; }
        @media (max-width: 600px) { .stat-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body data-lang="ko">
    <header>
        <div class="container header-flex">
            <a href="index.html" class="logo">VitalGuide</a>
            <div class="controls-bar">
                <button id="lang-toggle" class="control-btn">EN</button>
                <button id="theme-toggle" class="control-btn"><i class="fas fa-moon"></i></button>
            </div>
        </div>
        <nav>
            <a href="index.html" data-ko="AI 맞춤영양" data-en="AI Nutrition">AI 맞춤영양</a>
            <a href="exercise.html" data-ko="운동가이드" data-en="Exercise">운동가이드</a>
            <a href="psychology.html" data-ko="심리분석" data-en="Psychology">심리분석</a>
            <a href="mbti.html" data-ko="MBTI 테스트" data-en="MBTI Test">MBTI 테스트</a>
            <a href="fortune.html" data-ko="오늘의운세" data-en="Daily Fortune">오늘의운세</a>
            <a href="games.html" data-ko="미니게임" data-en="Mini Games">미니게임</a>
            <a href="blog.html" data-ko="건강가이드" data-en="Health Blog">건강가이드</a>
        </nav>
    </header>

    <main class="container">
        <div class="profile-wrap">
            <div id="profile-loading" style="text-align:center;padding:80px 20px;color:var(--text-muted);">
                <i class="fas fa-spinner fa-spin" style="font-size:2rem;margin-bottom:16px;display:block;"></i>
                불러오는 중...
            </div>
            <div id="profile-not-logged" style="display:none;">
                <div class="not-logged">
                    <div style="font-size:4rem;margin-bottom:16px;">🔐</div>
                    <h2>로그인이 필요합니다</h2>
                    <p>로그인하면 모든 테스트 결과와 게임 점수가 저장됩니다.</p>
                    <button onclick="window.showAuthModal()" style="padding:15px 36px;background:var(--primary-color);color:white;border:none;border-radius:16px;font-size:1rem;font-weight:900;cursor:pointer;">
                        <i class="fas fa-user" style="margin-right:8px;"></i>로그인 · 회원가입
                    </button>
                </div>
            </div>
            <div id="profile-content" style="display:none;"></div>
        </div>
    </main>

    <footer style="text-align:center;padding:40px 24px;border-top:1px solid var(--border-color);color:var(--text-muted);font-size:0.85rem;">
        <p>© 2026 VitalGuide &nbsp;|&nbsp; <a href="privacy.html" style="color:inherit;text-decoration:none;">Privacy</a></p>
    </footer>

    <script src="theme.js"></script>
    <script type="module">
        import { onUserChange, signOutUser, getLevelInfo } from './firebase-auth.js';

        const LEVELS = [
            { level:1, name:'🌱 웰니스 입문자',   nameEn:'🌱 Wellness Beginner', minXP:0    },
            { level:2, name:'🔍 건강 탐험가',      nameEn:'🔍 Health Explorer',   minXP:100  },
            { level:3, name:'💪 건강 실천가',      nameEn:'💪 Health Achiever',   minXP:300  },
            { level:4, name:'🧬 웰니스 전문가',    nameEn:'🧬 Wellness Expert',   minXP:700  },
            { level:5, name:'🏆 VitalGuide 마스터',nameEn:'🏆 VitalGuide Master', minXP:1500 },
        ];

        const RESULT_LABELS = {
            mbti:             { icon:'🧠', ko:'MBTI 유형',       en:'MBTI Type' },
            healthType:       { icon:'🦁', ko:'건강 유형',        en:'Health Type' },
            psychology:       { icon:'🧘', ko:'심리 분석',        en:'Psychology' },
            bmiCalculator:    { icon:'⚖️',  ko:'BMI',             en:'BMI' },
            runningCalculator:{ icon:'🏃', ko:'런닝 페이스',     en:'Running Pace' },
            biologicalAge:    { icon:'🧬', ko:'생체나이',         en:'Bio Age' },
            exercise:         { icon:'🏋️', ko:'운동 처방',        en:'Exercise Rx' },
        };

        const GAME_LABELS = {
            tetris:    { icon:'🟦', name:'테트리스' },
            sudoku:    { icon:'🔢', name:'스도쿠' },
            '2048':    { icon:'🎲', name:'2048' },
            flappy:    { icon:'🐦', name:'플래피버드' },
            minesweeper:{ icon:'💣', name:'지뢰찾기' },
            breakout:  { icon:'🏓', name:'블록깨기' },
            mole:      { icon:'🦡', name:'두더지잡기' },
        };

        function fmtDate(iso) {
            if (!iso) return '';
            return new Date(iso).toLocaleDateString('ko-KR', { month:'short', day:'numeric' });
        }

        function renderProfile(user, data) {
            const lang = localStorage.getItem('lang') || 'ko';
            const isKo = lang !== 'en';
            const xp   = data.xp || 0;
            const lvInfo = getLevelInfo(xp);
            const nextXP = lvInfo.next ? lvInfo.next.minXP : xp;
            const results = data.results || {};
            const games  = data.gameScores || {};
            const log    = (data.activityLog || []).slice().reverse().slice(0, 15);

            const activityCount = (data.activityLog || []).length;
            const gameCount     = Object.keys(games).length;

            const avatar = user.photoURL
                ? `<img src="${user.photoURL}" style="width:70px;height:70px;border-radius:50%;object-fit:cover;border:3px solid var(--accent-color);">`
                : `<div style="width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,var(--accent-color),#818cf8);display:flex;align-items:center;justify-content:center;font-size:2rem;">${lvInfo.name.split(' ')[0]}</div>`;

            document.getElementById('profile-content').innerHTML = `
                <!-- Header -->
                <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap;padding:36px 0 28px;">
                    ${avatar}
                    <div style="flex:1;min-width:180px;">
                        <div style="font-size:1.4rem;font-weight:900;margin-bottom:4px;">${user.displayName || (isKo ? '익명 사용자' : 'Anonymous')}</div>
                        <div style="font-size:0.85rem;color:var(--text-muted);margin-bottom:10px;">${user.email || ''}</div>
                        <div style="display:inline-block;background:color-mix(in srgb,var(--accent-color) 15%,transparent);color:var(--accent-color);padding:4px 14px;border-radius:99px;font-size:0.82rem;font-weight:800;">${isKo ? lvInfo.name : lvInfo.nameEn}</div>
                    </div>
                    <button onclick="if(confirm('${isKo ? '로그아웃 하시겠습니까?' : 'Sign out?'}')) signOut()"
                        style="padding:10px 18px;border:2px solid var(--border-color);border-radius:12px;background:transparent;cursor:pointer;font-size:0.85rem;font-weight:700;color:var(--text-muted);">
                        <i class="fas fa-sign-out-alt" style="margin-right:6px;"></i>${isKo ? '로그아웃' : 'Sign Out'}
                    </button>
                </div>

                <!-- XP Bar -->
                <div style="background:var(--card-bg);border:1px solid var(--border-color);border-radius:20px;padding:24px 28px;margin-bottom:20px;">
                    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;">
                        <span style="font-weight:900;font-size:1rem;">${xp.toLocaleString()} XP</span>
                        <span style="font-size:0.8rem;color:var(--text-muted);">${lvInfo.next ? `${isKo ? '다음 레벨까지' : 'Next level'} ${(nextXP - xp).toLocaleString()} XP` : (isKo ? '최고 레벨 달성! 🏆' : 'Max Level! 🏆')}</span>
                    </div>
                    <div class="xp-bar-wrap">
                        <div class="xp-bar-fill" style="width:${lvInfo.pct}%;"></div>
                    </div>
                    <div style="display:flex;justify-content:space-between;font-size:0.72rem;color:var(--text-muted);">
                        <span>Lv.${lvInfo.level} — ${isKo ? lvInfo.name : lvInfo.nameEn}</span>
                        ${lvInfo.next ? `<span>Lv.${lvInfo.level+1} — ${isKo ? lvInfo.next.name : lvInfo.next.nameEn}</span>` : ''}
                    </div>
                </div>

                <!-- Stats -->
                <div class="stat-grid">
                    <div class="stat-card">
                        <div class="sv" style="color:var(--accent-color);">${xp.toLocaleString()}</div>
                        <div class="sl">${isKo ? '총 XP' : 'Total XP'}</div>
                    </div>
                    <div class="stat-card">
                        <div class="sv" style="color:#8b5cf6;">${lvInfo.level}</div>
                        <div class="sl">${isKo ? '현재 레벨' : 'Current Level'}</div>
                    </div>
                    <div class="stat-card">
                        <div class="sv" style="color:#10b981;">${activityCount}</div>
                        <div class="sl">${isKo ? '완료한 활동' : 'Activities'}</div>
                    </div>
                    <div class="stat-card">
                        <div class="sv" style="color:#f59e0b;">${gameCount}</div>
                        <div class="sl">${isKo ? '게임 기록' : 'Game Records'}</div>
                    </div>
                </div>

                <!-- Results -->
                <div class="section-label">${isKo ? '📋 저장된 테스트 결과' : '📋 Saved Test Results'}</div>
                ${Object.keys(results).length === 0
                    ? `<div style="background:var(--card-bg);border:1px solid var(--border-color);border-radius:16px;padding:32px;text-align:center;color:var(--text-muted);font-size:0.9rem;">${isKo ? '아직 저장된 결과가 없습니다. 테스트를 완료하면 자동으로 저장됩니다.' : 'No results yet. Complete a test and they\'ll save automatically.'}</div>`
                    : `<div class="result-grid">${Object.entries(results).map(([key, val]) => {
                        const info = RESULT_LABELS[key] || { icon:'📊', ko: key, en: key };
                        return `<div class="result-card">
                            <div class="rc-label">${info.icon} ${isKo ? info.ko : info.en}</div>
                            <div class="rc-val">${val.value}</div>
                            <div class="rc-date">${fmtDate(val.savedAt)}</div>
                        </div>`;
                    }).join('')}</div>`
                }

                <!-- Game Scores -->
                <div class="section-label">${isKo ? '🎮 게임 최고 점수' : '🎮 Best Game Scores'}</div>
                ${Object.keys(games).length === 0
                    ? `<div style="background:var(--card-bg);border:1px solid var(--border-color);border-radius:16px;padding:32px;text-align:center;color:var(--text-muted);font-size:0.9rem;"><a href="games.html" style="color:var(--accent-color);font-weight:800;">${isKo ? '미니게임 하러 가기 →' : 'Play Mini Games →'}</a></div>`
                    : Object.entries(games).map(([key, score]) => {
                        const g = GAME_LABELS[key] || { icon:'🎮', name: key };
                        return `<div class="game-row">
                            <div class="gr-icon">${g.icon}</div>
                            <div class="gr-name">${g.name}</div>
                            <div class="gr-score">${score.toLocaleString()}</div>
                        </div>`;
                    }).join('')
                }

                <!-- Activity Log -->
                ${log.length > 0 ? `
                <div class="section-label">${isKo ? '⚡ 최근 활동 기록' : '⚡ Recent Activity'}</div>
                <div style="background:var(--card-bg);border:1px solid var(--border-color);border-radius:18px;overflow:hidden;">
                    ${log.map(entry => `
                        <div class="log-item">
                            <span style="flex:1;color:var(--text-muted);">${entry.label || entry.type}</span>
                            <span class="log-xp">+${entry.xp} XP</span>
                            <span style="font-size:0.75rem;color:var(--text-muted);margin-left:8px;">${fmtDate(entry.ts)}</span>
                        </div>`).join('')}
                </div>` : ''}

                <!-- CTA -->
                <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-top:30px;">
                    <a href="health-type-test.html" style="text-decoration:none;background:var(--card-bg);border:1px solid var(--border-color);border-radius:14px;padding:16px 18px;display:flex;gap:10px;align-items:center;transition:transform 0.2s;" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform=''">
                        <span style="font-size:1.5rem;">🦁</span><div><strong style="font-size:0.85rem;display:block;">${isKo ? '건강 유형 테스트' : 'Health Type Test'}</strong><span style="font-size:0.75rem;color:var(--text-muted);">+50 XP</span></div>
                    </a>
                    <a href="mbti.html" style="text-decoration:none;background:var(--card-bg);border:1px solid var(--border-color);border-radius:14px;padding:16px 18px;display:flex;gap:10px;align-items:center;transition:transform 0.2s;" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform=''">
                        <span style="font-size:1.5rem;">🧠</span><div><strong style="font-size:0.85rem;display:block;">MBTI ${isKo ? '테스트' : 'Test'}</strong><span style="font-size:0.75rem;color:var(--text-muted);">+50 XP</span></div>
                    </a>
                    <a href="games.html" style="text-decoration:none;background:var(--card-bg);border:1px solid var(--border-color);border-radius:14px;padding:16px 18px;display:flex;gap:10px;align-items:center;transition:transform 0.2s;" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform=''">
                        <span style="font-size:1.5rem;">🎮</span><div><strong style="font-size:0.85rem;display:block;">${isKo ? '미니게임' : 'Mini Games'}</strong><span style="font-size:0.75rem;color:var(--text-muted);">+50 XP ${isKo ? '(최고점 갱신)' : '(new record)'}</span></div>
                    </a>
                </div>
            `;
        }

        window.signOut = async function() {
            await signOutUser();
            location.href = 'index.html';
        };

        onUserChange((user, data) => {
            document.getElementById('profile-loading').style.display = 'none';
            if (user && data) {
                document.getElementById('profile-not-logged').style.display = 'none';
                document.getElementById('profile-content').style.display = 'block';
                renderProfile(user, data);
            } else if (user === null) {
                document.getElementById('profile-not-logged').style.display = 'block';
                document.getElementById('profile-content').style.display = 'none';
            }
        });
    </script>
</body>
</html>
