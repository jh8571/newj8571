<!DOCTYPE html>
<html lang="ko">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-P6CTZY2283"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date()); gtag('config', 'G-P6CTZY2283');

    <meta name="google-adsense-account" content="ca-pub-9103697866666926">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9103697866666926" crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 명예의 전당 — VitalGuide</title>
    <meta name="description" content="VitalGuide 게임 랭킹, 레벨 랭킹, 종합 점수 랭킹">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <meta name="robots" content="noindex, follow">
    <style>
        @keyframes skPulse { 0%,100%{opacity:1} 50%{opacity:.35} }
        .sk { animation: skPulse 1.3s infinite; background:var(--card-bg);
              border:1px solid var(--border-color); border-radius:14px; }
        .rank-row {
            display:flex; align-items:center; gap:12px; padding:13px 16px;
            background:var(--card-bg); border:1px solid var(--border-color);
            border-radius:14px; transition:.15s;
        }
        .rank-row:hover { transform:translateY(-2px); box-shadow:0 4px 16px rgba(0,0,0,.08); }
        .rank-row.gold   { border-color:#facc1566; background:rgba(250,204,21,.04); }
        .rank-row.silver { border-color:#94a3b866; }
        .rank-row.bronze { border-color:#cd7c2f66; }
        .tab-btn { flex:1; padding:10px 6px; border:none; border-radius:12px;
                   font-weight:800; cursor:pointer; font-size:.85rem; transition:.2s; }
        .tab-btn.on  { background:var(--primary-color); color:white; }
        .tab-btn.off { background:transparent; color:var(--text-muted); }
        .game-card { background:var(--card-bg); border:1px solid var(--border-color);
                     border-radius:18px; padding:16px 18px; }
        .grank-row { display:flex; align-items:center; gap:8px; padding:7px 0;
                     border-bottom:1px solid var(--border-color); }
        .grank-row:last-child { border-bottom:none; }
        .av { width:36px; height:36px; border-radius:50%; object-fit:cover; flex-shrink:0; }
        .av-ph { width:36px; height:36px; border-radius:50%; background:var(--border-color);
                 display:flex; align-items:center; justify-content:center; font-size:1rem; flex-shrink:0; }
        .sm-av { width:26px; height:26px; }
        .name-cell { flex:1; min-width:0; font-weight:800; font-size:.93rem;
                     overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .score-cell { font-weight:900; font-size:1.05rem; color:var(--primary-color); white-space:nowrap; }
        .empty { text-align:center; padding:36px 20px; color:var(--text-muted);
                 font-size:.88rem; line-height:1.7; }
    </style>
</head>
<body data-lang="ko">
    <header>
        <div class="container header-flex">
            <a href="/" class="logo" data-ko="VitalGuide" data-en="VitalGuide">VitalGuide</a>
            <div class="controls-bar">
                <button id="lang-toggle" class="control-btn">EN</button>
                <button id="theme-toggle" class="control-btn"><i class="fas fa-moon"></i></button>
            </div>
        </div>
        <nav>
            <a href="games.html" data-ko="🎮 미니게임" data-en="🎮 Games">🎮 미니게임</a>
            <a href="mbti.html" data-ko="🧠 MBTI" data-en="🧠 MBTI">🧠 MBTI</a>
            <a href="psychology.html" data-ko="💭 심리분석" data-en="💭 Psychology">💭 심리분석</a>
            <a href="fortune.html" data-ko="🔮 운세" data-en="🔮 Fortune">🔮 운세</a>
            <a href="animal.html" data-ko="🐾 동물 테스트" data-en="🐾 Animal">🐾 동물 테스트</a>
            <a href="quiz.html" data-ko="❓ 지식 퀴즈" data-en="❓ Quiz">❓ 지식 퀴즈</a>
            <a href="leaderboard.html" data-ko="🏆 랭킹" data-en="🏆 Ranking">🏆 랭킹</a>
            <a href="/" style="margin-left:auto; opacity:0.7;" data-ko="← 메인 사이트" data-en="← Main">← 메인 사이트</a>
        </nav>
    </header>

    <main class="container" style="max-width:960px;padding:20px 16px 80px;">

        <!-- Hero -->
        <div style="text-align:center;margin:24px 0 28px;">
            <div style="font-size:3.2rem;margin-bottom:6px;">🏆</div>
            <h1 style="font-size:1.9rem;font-weight:900;margin:0 0 8px;"
                data-ko="명예의 전당" data-en="Hall of Fame">명예의 전당</h1>
            <p style="color:var(--text-muted);font-size:.88rem;"
               data-ko="VitalGuide 최고의 건강인들이 모인 곳" data-en="Where VitalGuide's finest gather">VitalGuide 최고의 건강인들이 모인 곳</p>
            <a href="/nutrient-quiz.html" data-ko="영양소 퀴즈" data-en="Nutrient Quiz">영양소 퀴즈</a>
        </div>

        <!-- Tabs -->
        <div style="display:flex;gap:6px;background:var(--card-bg);border-radius:16px;
                    padding:5px;border:1px solid var(--border-color);margin-bottom:24px;">
            <button id="tb-lv" class="tab-btn on"  onclick="switchTab('lv')" data-ko="🌟 레벨"    data-en="🌟 Level">🌟 레벨 랭킹</button>
            <button id="tb-tt" class="tab-btn off" onclick="switchTab('tt')" data-ko="🎮 종합"    data-en="🎮 Total">🎮 종합 점수</button>
            <button id="tb-gm" class="tab-btn off" onclick="switchTab('gm')" data-ko="🕹️ 게임별" data-en="🕹️ Games">🕹️ 게임별</button>
            <button id="tb-qz" class="tab-btn off" onclick="switchTab('qz')" data-ko="🧠 퀴즈별" data-en="🧠 Quiz">🧠 퀴즈별</button>
        </div>

        <!-- Panels -->
        <div id="pn-lv"><div id="lv-list" style="display:flex;flex-direction:column;gap:8px;"></div></div>
        <div id="pn-tt" style="display:none;"><div id="tt-list" style="display:flex;flex-direction:column;gap:8px;"></div></div>
        <div id="pn-gm" style="display:none;"><div id="gm-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(285px,1fr));gap:14px;"></div></div>
        <div id="pn-qz" style="display:none;"><div id="qz-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(285px,1fr));gap:14px;"></div></div>

    </main>

    <script src="/theme.js"></script>
    <script type="module">
        import { getLeaderboard, getLevelInfo } from '/firebase-auth.js';

        /* ── tab ─────────────────────────────────────────────────── */
        const TABS = ['lv','tt','gm','qz'];
        window.switchTab = function(tab) {
            TABS.forEach(t => {
                document.getElementById('pn-'+t).style.display = t===tab ? '' : 'none';
                const b = document.getElementById('tb-'+t);
                b.classList.toggle('on',  t===tab);
                b.classList.toggle('off', t!==tab);
            });
        };

        /* ── helpers ─────────────────────────────────────────────── */
        const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

        function avHtml(e, size=36) {
            const cls = size < 32 ? 'sm-av' : '';
            return e.photo
                ? `<img src="${esc(e.photo)}" class="av ${cls}" style="width:${size}px;height:${size}px;">`
                : `<div class="av-ph ${cls}" style="width:${size}px;height:${size}px;font-size:${size*.42}px;">👤</div>`;
        }

        const MEDALS_BIG  = ['🥇','🥈','🥉'];
        const MEDALS_SMALL= ['🥇','🥈','🥉'];

        function rankRowHtml(e, i, scoreStr, sub='') {
            const cls = i===0?'gold':i===1?'silver':i===2?'bronze':'';
            const medal = i < 3
                ? `<span style="font-size:1.4rem;">${MEDALS_BIG[i]}</span>`
                : `<span style="font-size:.8rem;color:var(--text-muted);font-weight:800;min-width:28px;text-align:center;">${i+1}위</span>`;
            const clickable = e.uid ? `onclick="window.vgShowUserProfile&&window.vgShowUserProfile('${e.uid}')" style="cursor:pointer;" title="프로필 보기"` : '';
            return `
              <div class="rank-row ${cls}" ${clickable}>
                <div style="min-width:32px;text-align:center;">${medal}</div>
                ${avHtml(e)}
                <div style="flex:1;min-width:0;">
                  <div class="name-cell">${esc(e.name)}</div>
                  ${sub ? `<div style="font-size:.73rem;color:var(--text-muted);margin-top:2px;">${esc(sub)}</div>` : ''}
                </div>
                <div class="score-cell">${scoreStr}</div>
              </div>`;
        }

        function emptyHtml(msg='아직 기록이 없어요. 첫 번째 랭커가 되어보세요! 🎮') {
            return `<div class="empty">${msg}</div>`;
        }

        function skeletons(n) {
            return Array.from({length:n},(_,i)=>`<div class="sk" style="height:68px;${i===0?'border-color:#facc1533;':''}"></div>`).join('');
        }

        /* ── score formatters ────────────────────────────────────── */
        function fmtScore(key, score) {
            if (key === '_total')      return score.toLocaleString() + ' pts';
            if (key === 'minesweeper') return Math.max(0, 9999 - score) + '초 클리어';
            if (key === 'memory')      { const s=Math.min(5,Math.round(score/20)); return '⭐'.repeat(s)+'☆'.repeat(5-s); }
            if (key === 'sudoku')      return score + '% 정확';
            if (key === 'reaction')    return (1000-score) + 'ms';
            return score.toLocaleString() + '점';
        }

        /* ── game meta ───────────────────────────────────────────── */
        const GAMES = [
            {k:'tetris',      ko:'테트리스',     icon:'🟦'},
            {k:'snake',       ko:'스네이크',      icon:'🐍'},
            {k:'2048',        ko:'2048',          icon:'🎲'},
            {k:'breakout',    ko:'블록 깨기',     icon:'🧱'},
            {k:'flappy',      ko:'플래피버드',    icon:'🐦'},
            {k:'clicker',     ko:'클릭커',        icon:'👆'},
            {k:'math',        ko:'암산왕',        icon:'🧮'},
            {k:'typing',      ko:'타이핑',        icon:'⌨️'},
            {k:'color',       ko:'색상 찾기',     icon:'🎨'},
            {k:'sudoku',      ko:'스도쿠',        icon:'🔢'},
            {k:'memory',      ko:'기억력 카드',   icon:'🃏'},
            {k:'reaction',    ko:'반응속도',      icon:'⚡'},
            {k:'number',      ko:'숫자 맞추기',   icon:'🎯'},
            {k:'minesweeper', ko:'지뢰찾기',      icon:'💣'},
            {k:'whack',       ko:'두더지 잡기',   icon:'🔨'},
        ];

        /* ── init skeletons ──────────────────────────────────────── */
        document.getElementById('lv-list').innerHTML = skeletons(10);
        document.getElementById('tt-list').innerHTML = skeletons(10);
        document.getElementById('gm-grid').innerHTML = GAMES.map(g =>
            `<div class="game-card">
               <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
                 <span style="font-size:1.5rem;">${g.icon}</span>
                 <span style="font-weight:900;font-size:.95rem;">${g.ko}</span>
               </div>
               ${skeletons(3).replace(/height:68px/g,'height:40px')}
             </div>`).join('');

        /* ── quiz categories ─────────────────────────────────────── */
        const QUIZ_CATS = [
            {k:'quiz_kpolitics', ko:'한국 정치', icon:'🗳️'},
            {k:'quiz_wpolitics', ko:'세계 정치', icon:'🌐'},
            {k:'quiz_keconomy',  ko:'한국 경제', icon:'💰'},
            {k:'quiz_weconomy',  ko:'세계 경제', icon:'📈'},
            {k:'quiz_ksociety',  ko:'한국 사회', icon:'🏘️'},
            {k:'quiz_wsociety',  ko:'세계 사회', icon:'🌏'},
            {k:'quiz_khistory',  ko:'한국사',    icon:'📜'},
            {k:'quiz_whistory',  ko:'세계사',    icon:'🏛️'},
            {k:'quiz_science',   ko:'과학',      icon:'🔬'},
            {k:'quiz_it',        ko:'IT·기술',   icon:'💻'},
            {k:'quiz_general',   ko:'일반 상식', icon:'🎯'},
            {k:'quiz_sports',    ko:'스포츠',    icon:'⚽'},
            {k:'quiz_geography', ko:'지리',      icon:'🗺️'},
            {k:'quiz_music',     ko:'음악',      icon:'🎵'},
            {k:'quiz_math',      ko:'수학',      icon:'➕'},
            {k:'quiz_myth',      ko:'신화',      icon:'⚡'},
            {k:'quiz_art',       ko:'예술',      icon:'🎨'},
            {k:'quiz_film',      ko:'영화',      icon:'🎬'},
            {k:'quiz_nature',    ko:'자연과학',  icon:'🌿'},
            {k:'quiz_computer',  ko:'컴퓨터',    icon:'🖥️'},
        ];

        function quizGameCardHtml(g, top5) {
            const catKey = g.k.replace('quiz_','');
            const rows = top5.length ? top5.map((e, i) => `
                <div class="grank-row" ${e.uid?`onclick="window.vgShowUserProfile&&window.vgShowUserProfile('${e.uid}')" style="cursor:pointer;" title="프로필 보기"`:''}>
                    <span style="font-size:${i<3?'1.05rem':'.75rem'};min-width:26px;text-align:center;
                          ${i>=3?'color:var(--text-muted);font-weight:800;':''}">${i<3?MEDALS_SMALL[i]:(i+1)+'위'}</span>
                    ${avHtml(e, 26)}
                    <div style="flex:1;min-width:0;font-size:.82rem;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(e.name)}</div>
                    <div style="font-size:.82rem;font-weight:900;color:var(--primary-color);white-space:nowrap;">${(e.score||0).toLocaleString()}점</div>
                </div>`).join('')
            : `<div style="text-align:center;padding:18px 0;color:var(--text-muted);font-size:.8rem;">아직 기록 없음</div>`;
            return `<div class="game-card">
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border-color);">
                    <span style="font-size:1.5rem;">${g.icon}</span>
                    <span style="font-weight:900;font-size:.93rem;">${g.ko}</span>
                    <a href="quiz.html?cat=${catKey}" style="margin-left:auto;font-size:.72rem;font-weight:800;
                       color:var(--accent-color);text-decoration:none;padding:3px 8px;border:1px solid var(--accent-color);border-radius:8px;">도전 →</a>
                </div>
                ${rows}
            </div>`;
        }

        /* ── load & render ───────────────────────────────────────── */
        async function loadAll() {
            const [lvData, ttData, ...rest] = await Promise.all([
                getLeaderboard('_xp'),
                getLeaderboard('_total'),
                ...GAMES.map(g => getLeaderboard(g.k)),
            ]);
            const gameData = rest;

            /* level ranking */
            document.getElementById('lv-list').innerHTML = lvData.length
                ? lvData.map((e, i) => rankRowHtml(e, i,
                    `Lv.${e.level} · ${(e.xp||0).toLocaleString()} XP`,
                    e.tier || '')).join('')
                : emptyHtml();

            /* total score ranking */
            document.getElementById('tt-list').innerHTML = ttData.length
                ? ttData.map((e, i) => rankRowHtml(e, i, fmtScore('_total', e.score))).join('')
                : emptyHtml();

            /* per-game grid */
            document.getElementById('gm-grid').innerHTML = GAMES.map((g, gi) => {
                const top5 = (gameData[gi] || []).slice(0, 5);
                const rows = top5.length ? top5.map((e, i) => `
                    <div class="grank-row" ${e.uid?`onclick="window.vgShowUserProfile&&window.vgShowUserProfile('${e.uid}')" style="cursor:pointer;" title="프로필 보기"`:''}>
                        <span style="font-size:${i<3?'1.05rem':'.75rem'};min-width:26px;text-align:center;
                              ${i>=3?'color:var(--text-muted);font-weight:800;':''}">${i<3?MEDALS_SMALL[i]:(i+1)+'위'}</span>
                        ${avHtml(e, 26)}
                        <div style="flex:1;min-width:0;font-size:.82rem;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(e.name)}</div>
                        <div style="font-size:.82rem;font-weight:900;color:var(--primary-color);white-space:nowrap;">${fmtScore(g.k, e.score)}</div>
                    </div>`).join('')
                : `<div style="text-align:center;padding:18px 0;color:var(--text-muted);font-size:.8rem;">아직 기록 없음</div>`;
                return `<div class="game-card">
                    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border-color);">
                        <span style="font-size:1.5rem;">${g.icon}</span>
                        <span style="font-weight:900;font-size:.93rem;">${g.ko}</span>
                    </div>
                    ${rows}
                </div>`;
            }).join('');
        }

        /* ── load quiz rankings (lazy, on tab click) ─────────────── */
        let quizLoaded = false;
        const origSwitch = window.switchTab;
        window.switchTab = function(tab) {
            origSwitch(tab);
            if (tab === 'qz' && !quizLoaded) {
                quizLoaded = true;
                loadQuizRankings();
            }
        };

        async function loadQuizRankings() {
            const grid = document.getElementById('qz-grid');
            grid.innerHTML = QUIZ_CATS.map(g =>
                `<div class="game-card" id="qzc-${g.k}">
                    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
                        <span style="font-size:1.5rem;">${g.icon}</span>
                        <span style="font-weight:900;font-size:.93rem;">${g.ko}</span>
                    </div>
                    ${skeletons(3).replace(/height:68px/g,'height:40px')}
                </div>`).join('');

            for (const g of QUIZ_CATS) {
                try {
                    const top5 = (await getLeaderboard(g.k)).slice(0, 5);
                    const card = document.getElementById('qzc-' + g.k);
                    if (card) card.outerHTML = quizGameCardHtml(g, top5);
                } catch(e) {}
            }
        }

        loadAll().catch(err => {
            console.error('Leaderboard load failed:', err);
            document.getElementById('lv-list').innerHTML =
                `<div class="empty" style="color:#ef4444;">
                    데이터 로딩 실패.<br>Firebase Firestore 규칙에서 <code>/leaderboard</code> 읽기 권한을 확인해주세요.
                </div>`;
        });
    </script>
</body>
</html>
