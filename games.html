<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediInfo 게임 센터</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            padding: 40px 0;
        }
        .game-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: all 0.3s;
            cursor: pointer;
            border: 1px solid #e2e8f0;
        }
        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .game-icon {
            font-size: 3rem;
            color: var(--primary-color);
            margin-bottom: 20px;
        }
        /* Game Specific UI */
        #game-area {
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        canvas {
            background: #000;
            border: 2px solid #333;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }
        #sudoku-board {
            display: grid;
            grid-template-columns: repeat(9, 40px);
            grid-template-rows: repeat(9, 40px);
            gap: 0;
            border: 2px solid #333;
        }
        .sudoku-cell {
            width: 40px;
            height: 40px;
            border: 1px solid #ddd;
            text-align: center;
            font-size: 1.2rem;
            line-height: 40px;
            background: white;
            outline: none;
        }
        .sudoku-cell:focus { background: #f0f9ff; }
        .sudoku-cell.fixed { background: #f8fafc; font-weight: 800; color: #333; }
        .sudoku-cell:nth-child(3n) { border-right: 2px solid #333; }
        .sudoku-cell:nth-child(9n) { border-right: 2px solid #333; }
        .row-divider { border-bottom: 2px solid #333; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>MediInfo 게임 센터</h1>
            <p>휴식을 위한 간단한 게임을 즐겨보세요.</p>
            <nav>
                <a href="index.html">의약품 검색</a>
                <a href="psychology.html">심리테스트</a>
                <a href="mbti.html">MBTI 테스트</a>
                <a href="games.html" class="active">게임</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div id="game-list" class="game-grid">
            <div class="game-card" onclick="openGame('tetris')">
                <i class="fas fa-cubes game-icon"></i>
                <h3>테트리스</h3>
                <p>클래식 테트리스 게임</p>
            </div>
            <div class="game-card" onclick="openGame('sudoku')">
                <i class="fas fa-table game-icon"></i>
                <h3>스도쿠</h3>
                <p>두뇌 회전을 위한 숫자 퍼즐</p>
            </div>
        </div>

        <div id="game-modal" class="modal">
            <div class="modal-content" style="max-width: 600px;">
                <span class="close" onclick="closeGame()">&times;</span>
                <div id="game-body" style="text-align: center;">
                    <!-- Game Content -->
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 MediInfo. All rights reserved.</p>
        </div>
    </footer>

    <script src="games.js"></script>
</body>
</html>
