<!DOCTYPE html>
<html lang="ko">
<head>
    <meta name="google-adsense-account" content="ca-pub-9103697866666926">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9103697866666926" crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediInfo 게임 센터</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            padding: 40px 0;
        }
        .game-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: all 0.3s;
            cursor: pointer;
            border: 1px solid #e2e8f0;
        }
        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .game-icon {
            font-size: 3rem;
            color: var(--primary-color);
            margin-bottom: 20px;
        }
        /* Game Specific UI */
        #game-area {
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        canvas {
            background: #000;
            border: 2px solid #333;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }
        #sudoku-board {
            display: grid;
            grid-template-columns: repeat(9, 40px);
            grid-template-rows: repeat(9, 40px);
            gap: 0;
            border: 2px solid #333;
        }
        .sudoku-cell {
            width: 40px;
            height: 40px;
            border: 1px solid #ddd;
            text-align: center;
            font-size: 1.2rem;
            line-height: 40px;
            background: white;
            outline: none;
        }
        .sudoku-cell:focus { background: #f0f9ff; }
        .sudoku-cell.fixed { background: #f8fafc; font-weight: 800; color: #333; }
        .sudoku-cell:nth-child(3n) { border-right: 2px solid #333; }
        .sudoku-cell:nth-child(9n) { border-right: 2px solid #333; }
        .row-divider { border-bottom: 2px solid #333; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>MediInfo 게임 센터</h1>
            <p>휴식을 위한 간단한 게임을 즐겨보세요.</p>
            <nav>
                <a href="index.html">의약품 검색</a>
                <a href="psychology.html">심리테스트</a>
                <a href="mbti.html">MBTI 테스트</a>
                <a href="games.html" class="active">게임</a>
                <a href="animal.html">동물 AI</a>
                <a href="blog.html">건강 가이드</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div id="game-list" class="game-grid">
            <div class="game-card" onclick="openGame('tetris')">
                <i class="fas fa-cubes game-icon"></i>
                <h3>테트리스</h3>
                <p>클래식 테트리스 게임</p>
            </div>
            <div class="game-card" onclick="openGame('sudoku')">
                <i class="fas fa-table game-icon"></i>
                <h3>스도쿠</h3>
                <p>두뇌 회전을 위한 숫자 퍼즐</p>
            </div>
        </div>

        <div id="game-modal" class="modal">
            <div class="modal-content" style="max-width: 600px;">
                <span class="close" onclick="closeGame()">&times;</span>
                <div id="game-body" style="text-align: center;">
                    <!-- Game Content -->
                </div>
            </div>
        </div>
    </main>

    <!-- Partnership Inquiry Section -->
    <section class="container" style="margin-top: 80px; border-top: 1px solid #eee; padding-top: 60px;">
        <div style="max-width: 600px; margin: 0 auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
            <h2 style="text-align: center; margin-bottom: 30px; color: var(--secondary-color);">제휴 문의</h2>
            <form action="https://formspree.io/f/xaqpzkaj" method="POST">
                <div style="margin-bottom: 20px;">
                    <label style="display:block; margin-bottom:8px; font-weight:600;">성함 / 업체명</label>
                    <input type="text" name="name" required style="width:100%; padding:12px; border:1px solid #ddd; border-radius:8px; outline:none;">
                </div>
                <div style="margin-bottom: 20px;">
                    <label style="display:block; margin-bottom:8px; font-weight:600;">이메일 주소</label>
                    <input type="email" name="_replyto" required style="width:100%; padding:12px; border:1px solid #ddd; border-radius:8px; outline:none;">
                </div>
                <div style="margin-bottom: 20px;">
                    <label style="display:block; margin-bottom:8px; font-weight:600;">문의 내용</label>
                    <textarea name="message" required style="width:100%; padding:12px; border:1px solid #ddd; border-radius:8px; height:120px; outline:none; resize:none;"></textarea>
                </div>
                <button type="submit" style="width:100%; background:var(--primary-color); color:white; border:none; padding:15px; border-radius:8px; font-weight:700; cursor:pointer; font-size:1.1rem;">문의 보내기</button>
            </form>
        </div>
    </section>

    <!-- Comments Section -->
    <section class="container" style="margin-top: 80px; padding-bottom: 40px;">
        <div id="disqus_thread" style="background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);"></div>
        <script>
            var disqus_config = function () {
                this.page.url = window.location.href;  
                this.page.identifier = 'mediinfo-games'; 
            };
            (function() { 
                var d = document, s = d.createElement('script');
                s.src = 'https://jh8571.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
            })();
        </script>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2026 MediInfo. All rights reserved.</p>
            <div class="footer-links">
                <a href="about.html">소개</a>
                <a href="privacy.html">개인정보처리방침</a>
                <a href="terms.html">이용약관</a>
            </div>
        </div>
    </footer>

    <script src="games.js"></script>
</body>
</html>
