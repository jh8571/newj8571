    <style>
        .fortune-tabs {
            display: flex;
            justify-content: center;
            gap: 20px;

            flex-wrap: wrap;
        }
        .fortune-tab-btn {

            box-shadow: 0 10px 20px rgba(15, 23, 42, 0.2);

        .fortune-content-card {
            background: white;
            padding: 50px;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            text-align: center;
            min-height: 500px;
        }
        
        /* Tarot Card Flip Animation */
        .tarot-grid {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 40px 0;
            perspective: 1000px;
            flex-wrap: wrap;
        }
        .tarot-card-container {
            width: 140px;
            height: 240px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        .tarot-card-container.flipped {
            transform: rotateY(180deg);
        }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            border: 4px solid #f1f5f9;
            overflow: hidden;
        }
        .card-front {
            background: #fff;
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
        }
        .card-back {
            background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #38bdf8;
            font-size: 2.5rem;
        }
        .card-front img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Input Form Styles */
        .input-form {
            max-width: 500px;
            margin: 0 auto;
            display: grid;
            gap: 20px;
            text-align: left;
        }
        .input-group-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .input-item label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #475569;
        }
        .input-item input, .input-item select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
        }

        .fortune-result-box {
            background: #f8fafc;
            padding: 40px;
            border-radius: 24px;
            margin-top: 40px;
            border-left: 8px solid var(--accent-color);
            text-align: left;
            animation: slideIn 0.5s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
