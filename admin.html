<!DOCTYPE html>
<html lang="ko">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-P6CTZY2283"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-P6CTZY2283');</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 — 멤버 관리 | VitalGuide</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <style>
        .admin-wrap { max-width: 960px; margin: 0 auto; padding-bottom: 80px; }

        .access-denied { text-align: center; padding: 80px 20px; }
        .access-denied h2 { font-size: 2rem; margin-bottom: 12px; }
        .access-denied p  { color: var(--text-muted); }

        /* 통계 */
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 28px; }
        .stat-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 18px 20px; text-align: center; }
        .stat-card .stat-val   { font-size: 1.8rem; font-weight: 900; color: var(--primary-color); }
        .stat-card .stat-label { font-size: 0.78rem; color: var(--text-muted); margin-top: 4px; font-weight: 700; }

        /* 툴바 */
        .toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
        .search-box { flex: 1; min-width: 200px; display: flex; align-items: center; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 10px 14px; gap: 8px; }
        .search-box input { border: none; background: transparent; color: var(--text-main); font-size: 0.9rem; outline: none; flex: 1; }
        .sort-select { padding: 10px 14px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; font-size: 0.88rem; color: var(--text-main); outline: none; cursor: pointer; }
        .provider-filter { display: flex; gap: 6px; }
        .pf-btn { padding: 8px 14px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 10px; font-size: 0.8rem; font-weight: 700; cursor: pointer; color: var(--text-muted); transition: .15s; }
        .pf-btn.active { background: var(--primary-color); border-color: var(--primary-color); color: white; }

        /* 테이블 */
        .member-table { width: 100%; border-collapse: collapse; }
        .member-table thead th { padding: 10px 14px; text-align: left; font-size: 0.75rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; border-bottom: 2px solid var(--border-color); }
        .member-table tbody tr { border-bottom: 1px solid var(--border-color); cursor: pointer; transition: .15s; }
        .member-table tbody tr:hover { background: color-mix(in srgb, var(--primary-color) 4%, transparent); }
        .member-table td { padding: 12px 14px; vertical-align: middle; }

        .member-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; background: var(--border-color); display: flex; align-items: center; justify-content: center; font-size: 1rem; overflow: hidden; flex-shrink: 0; }
        .member-name-cell { display: flex; align-items: center; gap: 10px; }
        .member-name  { font-size: 0.9rem; font-weight: 800; color: var(--text-main); }
        .member-email { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }

        .level-badge { display: inline-flex; align-items: center; gap: 4px; background: color-mix(in srgb, var(--primary-color) 12%, transparent); color: var(--primary-color); border-radius: 8px; padding: 3px 10px; font-size: 0.78rem; font-weight: 800; white-space: nowrap; }
        .provider-badge { font-size: 0.72rem; font-weight: 700; padding: 2px 8px; border-radius: 99px; white-space: nowrap; }
        .pb-google { background: #dbeafe; color: #1e40af; }
        .pb-kakao  { background: #fef08a; color: #713f12; }

        /* 상세 패널 */
        .detail-row td { padding: 0 !important; cursor: default; }
        .detail-panel { border-bottom: 2px solid var(--primary-color); }
        .detail-inner { padding: 20px 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 24px; background: color-mix(in srgb, var(--primary-color) 3%, var(--bg-color)); }
        .detail-section h4 { font-size: 0.75rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }
        .detail-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; font-size: 0.83rem; border-bottom: 1px solid var(--border-color); }
        .detail-item:last-child { border-bottom: none; }
        .detail-item .di-key { color: var(--text-muted); }
        .detail-item .di-val { font-weight: 700; color: var(--text-main); max-width: 60%; text-align: right; word-break: break-all; }
        .xp-bar { height: 6px; background: var(--border-color); border-radius: 99px; margin-top: 6px; overflow: hidden; }
        .xp-fill { height: 100%; background: linear-gradient(90deg, var(--primary-color), var(--accent-color)); border-radius: 99px; }
        .game-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
        .game-item { background: var(--card-bg); border-radius: 8px; padding: 8px 10px; font-size: 0.8rem; display: flex; justify-content: space-between; align-items: center; }
        .game-item .gi-score { font-weight: 800; color: var(--primary-color); }
        .no-data { color: var(--text-muted); font-size: 0.82rem; padding: 4px 0; }

        .loading-msg { text-align: center; padding: 60px; color: var(--text-muted); }
        .empty-msg   { text-align: center; padding: 40px; color: var(--text-muted); }

        @media (max-width: 640px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .member-table thead { display: none; }
            .detail-inner { grid-template-columns: 1fr; }
            .game-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body data-lang="ko">
    <header>
        <div class="container header-flex">
            <a href="/" class="logo">VitalGuide</a>
            <div class="controls-bar">
                <button id="lang-toggle" class="control-btn">EN</button>
                <button id="theme-toggle" class="control-btn"><i class="fas fa-moon"></i></button>
            </div>
        </div>
        <nav>
            <a href="/">맞춤 영양분석</a>
            <a href="exercise.html">운동가이드</a>
            <a href="psychology.html">심리분석</a>
            <a href="mbti.html">MBTI 테스트</a>
            <a href="health-type-test.html" data-ko="건강유형테스트" data-en="Health Type">건강유형테스트</a>
            <a href="nutrient-quiz.html" data-ko="영양소 퀴즈" data-en="Nutrient Quiz">영양소 퀴즈</a>
            <a href="blog.html">건강가이드</a>
            <a href="community.html">커뮤니티</a>
        </nav>
    </header>

    <main class="container">
        <div class="admin-wrap">
            <section class="hero">
                <h2>🛡 관리자 — 멤버 관리</h2>
                <p>가입된 멤버 목록을 확인하고 관리하세요.</p>
            </section>
            <div id="admin-content">
                <div class="loading-msg">🔐 인증 확인 중...</div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>© 2026 VitalGuide &nbsp;|&nbsp; <a href="privacy.html" style="color:inherit;text-decoration:none;">Privacy</a> &nbsp;|&nbsp; <a href="terms.html" style="color:inherit;text-decoration:none;">Terms</a></p>
        </div>
    </footer>

    <script src="theme.js"></script>
    <script type="module">
    import { db, getCurrentUser, onUserChange, getTier } from './firebase-auth.js';
    import {
        collection, getDocs, query, orderBy, doc, getDoc
    } from 'https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js';

    const ADMIN_EMAIL = 'shokoku0701@gmail.com';
    const GAME_LABELS = {
        tetris: '테트리스', minesweeper: '지뢰찾기', sudoku: '스도쿠',
        memory: '기억력 게임', flappy: '플래피버드', whack: '두더지잡기'
    };

    function esc(s) {
        return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }
    function fmtDate(ts) {
        if (!ts) return '-';
        try { const d = ts.toDate(); return d.toLocaleDateString('ko-KR', {year:'numeric',month:'2-digit',day:'2-digit'}); } catch { return '-'; }
    }
    function fmtNum(n) { return Number(n||0).toLocaleString(); }

    function getProvider(uid, data) {
        if (uid.startsWith('kakao_') || data.provider === 'kakao') return 'kakao';
        return 'google_or_email';
    }
    function providerBadgeHtml(uid, data) {
        return getProvider(uid, data) === 'kakao'
            ? '<span class="provider-badge pb-kakao">🟡 카카오</span>'
            : '<span class="provider-badge pb-google">🔵 구글/이메일</span>';
    }

    // ── 상태 ──
    let allMembers = [];
    let openDetailUid = null;

    // ── 필터 & 렌더 ──
    function applyFilters() {
        const q   = (document.getElementById('search-input')?.value || '').toLowerCase();
        const srt = document.getElementById('sort-select')?.value || 'joinedAt_desc';
        const pf  = document.querySelector('.pf-btn.active')?.dataset.provider || 'all';

        let list = allMembers.filter(m => {
            const matchQ  = !q
                || (m.data.displayName||'').toLowerCase().includes(q)
                || (m.data.email||'').toLowerCase().includes(q);
            const matchPf = pf === 'all' || getProvider(m.uid, m.data) === pf;
            return matchQ && matchPf;
        });

        list.sort((a, b) => {
            switch (srt) {
                case 'joinedAt_asc':  return (a.data.joinedAt?.seconds||0) - (b.data.joinedAt?.seconds||0);
                case 'level_desc':   return (b.data.level||1) - (a.data.level||1);
                case 'xp_desc':      return (b.data.xp||0) - (a.data.xp||0);
                default:             return (b.data.joinedAt?.seconds||0) - (a.data.joinedAt?.seconds||0);
            }
        });

        const tbody = document.getElementById('member-tbody');
        if (!list.length) {
            tbody.innerHTML = `<tr><td colspan="6"><div class="empty-msg">검색 결과 없음</div></td></tr>`;
            return;
        }
        tbody.innerHTML = list.map(m => memberRowHtml(m)).join('');
        tbody.querySelectorAll('tr[data-uid]').forEach(tr =>
            tr.addEventListener('click', () => toggleDetail(tr.dataset.uid, list))
        );
    }

    function memberRowHtml(m) {
        const { uid, data } = m;
        const tier = getTier(data.level || 1);
        const gameCount   = Object.keys(data.gameScores || {}).length;
        const resultCount = Object.keys(data.results || {}).length;
        const avatar = data.photoURL
            ? `<img class="member-avatar" src="${esc(data.photoURL)}" onerror="this.outerHTML='<div class=member-avatar style=display:flex;align-items:center;justify-content:center;>👤</div>'">`
            : `<div class="member-avatar" style="display:flex;align-items:center;justify-content:center;">👤</div>`;

        return `<tr data-uid="${esc(uid)}">
            <td>
                <div class="member-name-cell">
                    ${avatar}
                    <div>
                        <div class="member-name">${esc(data.displayName||'익명')}</div>
                        <div class="member-email">${esc(data.email || uid)}</div>
                    </div>
                </div>
            </td>
            <td>${providerBadgeHtml(uid, data)}</td>
            <td><span class="level-badge">${tier.icon} Lv.${data.level||1}</span></td>
            <td style="font-weight:800;color:var(--primary-color);">${fmtNum(data.xp)} XP</td>
            <td style="font-size:0.82rem;color:var(--text-muted);">${fmtDate(data.joinedAt)}</td>
            <td style="font-size:0.8rem;color:var(--text-muted);">게임 ${gameCount}종 · 테스트 ${resultCount}개</td>
        </tr>`;
    }

    function toggleDetail(uid, list) {
        const existing = document.getElementById('detail-' + uid);
        if (existing) { existing.remove(); openDetailUid = null; return; }
        if (openDetailUid) {
            const old = document.getElementById('detail-' + openDetailUid);
            if (old) old.remove();
        }
        openDetailUid = uid;

        const m = list.find(x => x.uid === uid);
        if (!m) return;
        const { data } = m;
        const tier = getTier(data.level || 1);

        const xp    = data.xp || 0;
        const level = data.level || 1;
        const nextThreshold = level * 100;
        const curThreshold  = (level - 1) * 100;
        const pct = Math.min(100, Math.round(((xp - curThreshold) / Math.max(nextThreshold - curThreshold, 1)) * 100));

        const gameHtml = Object.keys(data.gameScores || {}).length
            ? `<div class="game-grid">${Object.entries(data.gameScores).map(([k,v]) =>
                `<div class="game-item"><span>${GAME_LABELS[k]||k}</span><span class="gi-score">${fmtNum(v)}점</span></div>`
              ).join('')}</div>`
            : `<div class="no-data">기록 없음</div>`;

        const resultHtml = Object.keys(data.results || {}).length
            ? Object.entries(data.results).map(([k,v]) =>
                `<div class="detail-item">
                    <span class="di-key">${esc(k)}</span>
                    <span class="di-val">${esc(String(v?.label||v?.result||v||'').slice(0,30))}</span>
                </div>`).join('')
            : `<div class="no-data">기록 없음</div>`;

        const logHtml = (data.activityLog||[]).length
            ? [...(data.activityLog)].reverse().slice(0,5).map(l =>
                `<div class="detail-item">
                    <span class="di-key">${esc(l.label||l.key||'-')}</span>
                    <span class="di-val">+${l.xp||0} XP</span>
                </div>`).join('')
            : `<div class="no-data">활동 없음</div>`;

        const tr = document.createElement('tr');
        tr.id = 'detail-' + uid;
        tr.className = 'detail-row';
        tr.innerHTML = `<td colspan="6">
            <div class="detail-panel">
                <div class="detail-inner">
                    <div class="detail-section">
                        <h4>계정 정보</h4>
                        <div class="detail-item"><span class="di-key">UID</span><span class="di-val" style="font-size:0.68rem;">${esc(uid)}</span></div>
                        <div class="detail-item"><span class="di-key">이메일</span><span class="di-val">${esc(data.email||'-')}</span></div>
                        <div class="detail-item"><span class="di-key">가입일</span><span class="di-val">${fmtDate(data.joinedAt)}</span></div>
                        <div class="detail-item"><span class="di-key">레벨</span><span class="di-val">${tier.icon} ${tier.ko} Lv.${level}</span></div>
                        <div class="detail-item"><span class="di-key">총 XP</span><span class="di-val">${fmtNum(xp)}</span></div>
                        <div class="xp-bar" style="margin-bottom:16px;"><div class="xp-fill" style="width:${pct}%"></div></div>
                        <h4>테스트 결과</h4>
                        ${resultHtml}
                    </div>
                    <div class="detail-section">
                        <h4>게임 최고 점수</h4>
                        ${gameHtml}
                        <h4 style="margin-top:16px;">활동 로그 (최근 5개)</h4>
                        ${logHtml}
                    </div>
                </div>
            </div>
        </td>`;

        const targetRow = document.querySelector(`tr[data-uid="${CSS.escape(uid)}"]`);
        if (targetRow) targetRow.insertAdjacentElement('afterend', tr);
    }

    // ── Firestore 전체 멤버 로드 ──
    async function loadMembers() {
        try {
            const snap = await getDocs(query(collection(db, 'users'), orderBy('joinedAt', 'desc')));
            allMembers = snap.docs.map(d => ({ uid: d.id, data: d.data() }));
        } catch(e) {
            // joinedAt 인덱스 없을 수 있음 → 전체 로드 후 JS 정렬
            const snap = await getDocs(collection(db, 'users'));
            allMembers = snap.docs.map(d => ({ uid: d.id, data: d.data() }));
        }

        const kakaoCount = allMembers.filter(m => getProvider(m.uid, m.data) === 'kakao').length;
        const totalXP    = allMembers.reduce((s, m) => s + (m.data.xp||0), 0);

        document.getElementById('stat-total').textContent  = allMembers.length;
        document.getElementById('stat-kakao').textContent  = kakaoCount;
        document.getElementById('stat-other').textContent  = allMembers.length - kakaoCount;
        document.getElementById('stat-xp').textContent     = fmtNum(totalXP);

        applyFilters();
    }

    // ── 관리자 UI ──
    function renderAdminUI() {
        document.getElementById('admin-content').innerHTML = `
            <div class="stats-row">
                <div class="stat-card"><div class="stat-val" id="stat-total">…</div><div class="stat-label">전체 멤버</div></div>
                <div class="stat-card"><div class="stat-val" id="stat-kakao">…</div><div class="stat-label">카카오 가입</div></div>
                <div class="stat-card"><div class="stat-val" id="stat-other">…</div><div class="stat-label">구글/이메일</div></div>
                <div class="stat-card"><div class="stat-val" id="stat-xp">…</div><div class="stat-label">누적 XP 합계</div></div>
            </div>
            <div class="toolbar">
                <div class="search-box">
                    <i class="fas fa-search" style="color:var(--text-muted);font-size:0.85rem;"></i>
                    <input type="text" id="search-input" placeholder="이름 또는 이메일 검색...">
                </div>
                <select class="sort-select" id="sort-select">
                    <option value="joinedAt_desc">최신 가입순</option>
                    <option value="joinedAt_asc">오래된 순</option>
                    <option value="level_desc">레벨 높은순</option>
                    <option value="xp_desc">XP 높은순</option>
                </select>
                <div class="provider-filter">
                    <button class="pf-btn active" data-provider="all">전체</button>
                    <button class="pf-btn" data-provider="google_or_email">구글/이메일</button>
                    <button class="pf-btn" data-provider="kakao">카카오</button>
                </div>
            </div>
            <div style="background:var(--card-bg);border:1px solid var(--border-color);border-radius:20px;overflow:hidden;">
                <table class="member-table">
                    <thead>
                        <tr>
                            <th>멤버</th><th>가입 방법</th><th>레벨</th>
                            <th>XP</th><th>가입일</th><th>활동</th>
                        </tr>
                    </thead>
                    <tbody id="member-tbody">
                        <tr><td colspan="6"><div class="loading-msg">불러오는 중…</div></td></tr>
                    </tbody>
                </table>
            </div>`;

        document.getElementById('search-input').addEventListener('input', applyFilters);
        document.getElementById('sort-select').addEventListener('change', applyFilters);
        document.querySelectorAll('.pf-btn').forEach(btn =>
            btn.addEventListener('click', () => {
                document.querySelectorAll('.pf-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                applyFilters();
            })
        );

        loadMembers();
    }

    function renderDenied() {
        document.getElementById('admin-content').innerHTML = `
            <div class="access-denied">
                <h2>🔒 접근 불가</h2>
                <p>관리자 계정으로 로그인해야 접근할 수 있습니다.</p>
                <button onclick="window.showAuthModal()" style="margin-top:24px;padding:12px 28px;background:var(--primary-color);color:white;border:none;border-radius:12px;font-size:0.9rem;font-weight:800;cursor:pointer;">
                    로그인
                </button>
            </div>`;
    }

    // Firebase Auth 상태 감지 (onUserChange가 확정된 값으로 한 번 이상 호출됨)
    let initialized = false;
    onUserChange(user => {
        initialized = true;
        if (user?.email === ADMIN_EMAIL) renderAdminUI();
        else renderDenied();
    });

    // 이미 로그인된 상태라면 즉시 처리
    const initUser = getCurrentUser();
    if (initUser !== null && initUser !== undefined && !initialized) {
        if (initUser?.email === ADMIN_EMAIL) renderAdminUI();
        else renderDenied();
    }
    </script>
    <script src="cookie-consent.js"></script>
</body>
</html>
