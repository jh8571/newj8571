    <script src="theme.js"></script>
    <script>
    const CATEGORIES = [
        { id: 11, ko: '가슴',   en: 'Chest',      icon: '🫀' },
        { id: 12, ko: '등',     en: 'Back',        icon: '🏋️' },
        { id: 13, ko: '어깨',   en: 'Shoulders',   icon: '💪' },
        { id: 8,  ko: '팔',     en: 'Arms',        icon: '🦾' },
        { id: 9,  ko: '다리',   en: 'Legs',        icon: '🦵' },
        { id: 10, ko: '복근',   en: 'Abs',         icon: '🔥' },
        { id: 14, ko: '종아리', en: 'Calves',      icon: '🏃' },
    ];

    let allExercises = [];
    let currentCatId = null;
    let nextUrl      = null;

    function buildTabs() {
        const t    = window.t;
        const lang = localStorage.getItem('lang') || 'ko';
        const el   = document.getElementById('cat-tabs');
        el.innerHTML = CATEGORIES.map(c => {
            const label = lang === 'ko' ? c.ko : c.en;
            return `<button class="cat-tab" id="tab-${c.id}" onclick="loadCategory(${c.id})">
                ${c.icon} ${label}
            </button>`;
        }).join('');
    }

    async function loadCategory(catId) {
        const t = window.t;
        currentCatId  = catId;
        allExercises  = [];
        nextUrl       = null;

        CATEGORIES.forEach(c =>
            document.getElementById('tab-' + c.id)?.classList.toggle('active', c.id === catId)
        );
        document.getElementById('ex-search').value = '';

        const el = document.getElementById('ex-results');
        el.innerHTML = `<div class="wd-status"><div class="icon">⏳</div><p>${t('운동 목록 불러오는 중...', 'Loading exercises...')}</p></div>`;
        document.getElementById('load-more-wrap').innerHTML = '';
        document.getElementById('ex-count').innerHTML = '';

        await fetchExercises(`https://wger.de/api/v2/exerciseinfo/?format=json&language=2&category=${catId}&limit=20`);
    }

    async function fetchExercises(url) {
        const t = window.t;
        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error(res.status);
            const data = await res.json();

            const valid = (data.results || []).filter(ex => {
                const tr = getTranslation(ex);
                return tr && tr.name;
            });

            allExercises = allExercises.concat(valid);
            nextUrl = data.next || null;
            renderExercises(allExercises);
        } catch {
            document.getElementById('ex-results').innerHTML =
                `<div class="wd-status"><div class="icon">⚠️</div><p>${t('데이터를 불러올 수 없습니다. 잠시 후 다시 시도해주세요.', 'Could not load data. Please try again later.')}</p></div>`;
        }
    }

    function getTranslation(ex) {
        if (!ex.translations) return null;
        return ex.translations.find(tr => tr.language === 2) || ex.translations[0] || null;
    }

    function stripHtml(html) {
        if (!html) return '';
        return html.replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim();
    }

    function renderExercises(exList) {
        const t          = window.t;
        const nameFilter = document.getElementById('ex-search').value.trim().toLowerCase();
        const filtered   = nameFilter
            ? exList.filter(ex => {
                const tr = getTranslation(ex);
                return tr && tr.name.toLowerCase().includes(nameFilter);
              })
            : exList;

        const countEl = document.getElementById('ex-count');
        countEl.innerHTML = filtered.length > 0
            ? `<p class="result-count">${t(`${filtered.length}개 운동 표시`, `${filtered.length} exercises`)}</p>`
            : '';

        if (filtered.length === 0) {
            document.getElementById('ex-results').innerHTML =
                `<div class="wd-status"><div class="icon">😅</div><p>${t('검색 결과가 없습니다.', 'No results found.')}</p></div>`;
            document.getElementById('load-more-wrap').innerHTML = '';
            return;
        }

        const noDescLabel  = t('설명 없음', 'No description');
        const showMoreLabel = t('더 보기 ▾', 'Show more ▾');

        const cards = filtered.map(ex => {
            const tr      = getTranslation(ex);
            const name    = tr?.name || '–';
            const desc    = stripHtml(tr?.description || '');
            const muscles = (ex.muscles || []).map(m =>
                `<span class="ex-tag tag-muscle">${m.name_en || m.name}</span>`
            ).join('');
            const equips  = (ex.equipment || []).map(e =>
                `<span class="ex-tag tag-equip">${e.name}</span>`
            ).join('');

            return `<div class="ex-card">
                <div class="ex-name">${name}</div>
                <div class="ex-tags">${muscles}${equips}</div>
                ${desc
                    ? `<div class="ex-desc" id="desc-${ex.id}">${desc}</div>
                       ${desc.length > 200 ? `<button class="ex-more-btn" onclick="expandDesc(${ex.id},this)">${showMoreLabel}</button>` : ''}`
                    : `<p style="font-size:0.82rem;color:var(--text-muted);">${noDescLabel}</p>`}
            </div>`;
        }).join('');

        document.getElementById('ex-results').innerHTML = `<div class="ex-grid">${cards}</div>`;

        document.getElementById('load-more-wrap').innerHTML = nextUrl && !nameFilter
            ? `<button class="load-more-btn" onclick="loadMore()">${t('더 보기 (20개 추가)', 'Load more (20 more)')}</button>`
            : '';
    }

    function expandDesc(id, btn) {
        const el = document.getElementById('desc-' + id);
        if (el) { el.style.webkitLineClamp = 'unset'; el.style.overflow = 'visible'; }
        btn.remove();
    }

    async function loadMore() {
        const t = window.t;
        if (!nextUrl) return;
        document.getElementById('load-more-wrap').innerHTML =
            `<button class="load-more-btn" disabled>${t('불러오는 중...', 'Loading...')}</button>`;
        await fetchExercises(nextUrl);
    }

    function filterByName() {
        if (allExercises.length > 0) renderExercises(allExercises);
    }

    document.getElementById('ex-search').addEventListener('keydown', e => {
        if (e.key === 'Enter') filterByName();
    });

    buildTabs();
    </script>
    <script src="cookie-consent.js"></script>
