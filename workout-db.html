    <script src="theme.js"></script>
    <script>
    const CATEGORIES = [
        { id: 11, ko: '가슴', icon: '🫀' },
        { id: 12, ko: '등', icon: '🏋️' },
        { id: 13, ko: '어깨', icon: '💪' },
        { id: 8,  ko: '팔', icon: '🦾' },
        { id: 9,  ko: '다리', icon: '🦵' },
        { id: 10, ko: '복근', icon: '🔥' },
        { id: 14, ko: '종아리', icon: '🏃' },
    ];

    let allExercises = [];
    let currentCatId = null;
    let nextUrl = null;

    function buildTabs() {
        const el = document.getElementById('cat-tabs');
        el.innerHTML = CATEGORIES.map(c =>
            `<button class="cat-tab" id="tab-${c.id}" onclick="loadCategory(${c.id})">
                ${c.icon} ${c.ko}
            </button>`
        ).join('');
    }

    async function loadCategory(catId) {
        currentCatId = catId;
        allExercises = [];
        nextUrl = null;

        CATEGORIES.forEach(c => {
            document.getElementById('tab-' + c.id)?.classList.toggle('active', c.id === catId);
        });
        document.getElementById('ex-search').value = '';

        const el = document.getElementById('ex-results');
        el.innerHTML = '<div class="wd-status"><div class="icon">⏳</div><p>운동 목록 불러오는 중...</p></div>';
        document.getElementById('load-more-wrap').innerHTML = '';
        document.getElementById('ex-count').innerHTML = '';

        await fetchExercises(`https://wger.de/api/v2/exerciseinfo/?format=json&language=2&category=${catId}&limit=20`);
    }

    async function fetchExercises(url) {
        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error(res.status);
            const data = await res.json();

            const valid = (data.results || []).filter(ex => {
                const t = getTranslation(ex);
                return t && t.name;
            });

            allExercises = allExercises.concat(valid);
            nextUrl = data.next || null;

            renderExercises(allExercises);
        } catch {
            document.getElementById('ex-results').innerHTML =
                '<div class="wd-status"><div class="icon">⚠️</div><p>데이터를 불러올 수 없습니다. 잠시 후 다시 시도해주세요.</p></div>';
        }
    }

    function getTranslation(ex) {
        if (!ex.translations) return null;
        return ex.translations.find(t => t.language === 2) || ex.translations[0] || null;
    }

    function stripHtml(html) {
        if (!html) return '';
        return html.replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim();
    }

    function renderExercises(exList) {
        const nameFilter = document.getElementById('ex-search').value.trim().toLowerCase();
        const filtered = nameFilter
            ? exList.filter(ex => {
                const t = getTranslation(ex);
                return t && t.name.toLowerCase().includes(nameFilter);
              })
            : exList;

        const count = document.getElementById('ex-count');
        count.innerHTML = filtered.length > 0
            ? `<p class="result-count">${filtered.length}개 운동 표시</p>`
            : '';

        if (filtered.length === 0) {
            document.getElementById('ex-results').innerHTML =
                '<div class="wd-status"><div class="icon">😅</div><p>검색 결과가 없습니다.</p></div>';
            document.getElementById('load-more-wrap').innerHTML = '';
            return;
        }

        const cards = filtered.map(ex => {
            const t = getTranslation(ex);
            const name = t?.name || '알 수 없음';
            const desc = stripHtml(t?.description || '');
            const muscles = (ex.muscles || []).map(m => `<span class="ex-tag tag-muscle">${m.name_en || m.name}</span>`).join('');
            const equips = (ex.equipment || []).map(e => `<span class="ex-tag tag-equip">${e.name}</span>`).join('');

            return `<div class="ex-card">
                <div class="ex-name">${name}</div>
                <div class="ex-tags">${muscles}${equips}</div>
                ${desc ? `<div class="ex-desc" id="desc-${ex.id}">${desc}</div>
                    ${desc.length > 200 ? `<button class="ex-more-btn" onclick="expandDesc(${ex.id}, this)">더 보기 ▾</button>` : ''}`
                    : '<p style="font-size:0.82rem;color:var(--text-muted);">설명 없음</p>'}
            </div>`;
        }).join('');

        document.getElementById('ex-results').innerHTML = `<div class="ex-grid">${cards}</div>`;

        const lmWrap = document.getElementById('load-more-wrap');
        lmWrap.innerHTML = nextUrl && !nameFilter
            ? `<button class="load-more-btn" onclick="loadMore()">더 보기 (20개 추가)</button>`
            : '';
    }

    function expandDesc(id, btn) {
        const el = document.getElementById('desc-' + id);
        if (el) {
            el.style.webkitLineClamp = 'unset';
            el.style.overflow = 'visible';
        }
        btn.remove();
    }

    async function loadMore() {
        if (!nextUrl) return;
        document.getElementById('load-more-wrap').innerHTML =
            '<button class="load-more-btn" disabled>불러오는 중...</button>';
        await fetchExercises(nextUrl);
    }

    function filterByName() {
        if (allExercises.length > 0) renderExercises(allExercises);
    }

    document.getElementById('ex-search').addEventListener('keydown', e => {
        if (e.key === 'Enter') filterByName();
    });

    buildTabs();
    </script>
