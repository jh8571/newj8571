<!DOCTYPE html>
<html lang="ko">
<head>
    <meta name="google-adsense-account" content="ca-pub-9103697866666926">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9103697866666926" crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정밀 MBTI 테스트 - MediInfo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .test-container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .progress-container {
            width: 100%;
            height: 10px;
            background: #e2e8f0;
            border-radius: 5px;
            margin-bottom: 40px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: var(--primary-color);
            width: 0%;
            transition: width 0.3s ease;
        }
        .question-box {
            display: none;
            animation: fadeIn 0.5s;
        }
        .question-box.active {
            display: block;
        }
        .question-text {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--secondary-color);
            margin-bottom: 40px;
            text-align: center;
        }
        .mbti-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .mbti-opt-btn {
            padding: 20px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            background: white;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .mbti-opt-btn:hover {
            border-color: var(--primary-color);
            background: #f8fafc;
        }
        .mbti-opt-btn.selected {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .result-container {
            display: none;
        }
        .analysis-chart {
            margin: 30px 0;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .chart-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .chart-label {
            width: 40px;
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--primary-color);
        }
        .chart-bar-bg {
            flex: 1;
            height: 20px;
            background: #e2e8f0;
            border-radius: 10px;
            position: relative;
        }
        .chart-bar-fill {
            height: 100%;
            background: var(--primary-color);
            border-radius: 10px;
            transition: width 1s ease-out;
        }
        .chart-percent {
            width: 50px;
            font-weight: 600;
            text-align: right;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>정밀 MBTI 성격분석</h1>
            <p>24개의 정밀 문항을 통해 당신의 잠재된 성향을 분석합니다.</p>
            <nav>
                <a href="index.html">의약품 검색</a>
                <a href="psychology.html">심리테스트</a>
                <a href="mbti.html" class="active">MBTI 테스트</a>
                <a href="games.html">게임</a>
                <a href="animal.html">동물 AI</a>
                <a href="blog.html">건강 가이드</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <!-- Intro Section -->
        <div id="intro-section" class="test-container" style="text-align: center;">
            <i class="fas fa-brain" style="font-size: 4rem; color: var(--primary-color); margin-bottom: 20px;"></i>
            <h2 style="margin-bottom: 20px;">당신은 어떤 사람인가요?</h2>
            <p style="color: var(--text-muted); margin-bottom: 40px; line-height: 1.8;">
                본 테스트는 약 5분 정도 소요됩니다.<br>
                가능한 '중립' 보다는 솔직한 답변을 선택할 때 더 정확한 결과가 나옵니다.
            </p>
            <button class="search-container" style="display:inline-block; border:none; background:var(--primary-color); color:white; padding:15px 40px; font-size:1.2rem; cursor:pointer; border-radius:50px;" onclick="startMbtiTest()">
                테스트 시작하기
            </button>
        </div>

        <!-- Test Section -->
        <div id="test-section" class="test-container" style="display: none;">
            <div class="progress-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            <div id="question-container">
                <!-- Questions will be injected here -->
            </div>
        </div>

        <!-- Result Section -->
        <div id="result-section" class="test-container result-container">
            <!-- Results will be injected here -->
        </div>
    </main>

    <!-- Partnership Inquiry Section -->
    <section class="container" style="margin-top: 80px; border-top: 1px solid #eee; padding-top: 60px;">
        <div style="max-width: 600px; margin: 0 auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
            <h2 style="text-align: center; margin-bottom: 30px; color: var(--secondary-color);">제휴 문의</h2>
            <form action="https://formspree.io/f/xaqpzkaj" method="POST">
                <div style="margin-bottom: 20px;">
                    <label style="display:block; margin-bottom:8px; font-weight:600;">성함 / 업체명</label>
                    <input type="text" name="name" required style="width:100%; padding:12px; border:1px solid #ddd; border-radius:8px; outline:none;">
                </div>
                <div style="margin-bottom: 20px;">
                    <label style="display:block; margin-bottom:8px; font-weight:600;">이메일 주소</label>
                    <input type="email" name="_replyto" required style="width:100%; padding:12px; border:1px solid #ddd; border-radius:8px; outline:none;">
                </div>
                <div style="margin-bottom: 20px;">
                    <label style="display:block; margin-bottom:8px; font-weight:600;">문의 내용</label>
                    <textarea name="message" required style="width:100%; padding:12px; border:1px solid #ddd; border-radius:8px; height:120px; outline:none; resize:none;"></textarea>
                </div>
                <button type="submit" style="width:100%; background:var(--primary-color); color:white; border:none; padding:15px; border-radius:8px; font-weight:700; cursor:pointer; font-size:1.1rem;">문의 보내기</button>
            </form>
        </div>
    </section>

    <!-- Comments Section -->
    <section class="container" style="margin-top: 80px; padding-bottom: 40px;">
        <div id="disqus_thread" style="background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);"></div>
        <script>
            var disqus_config = function () {
                this.page.url = window.location.href;  
                this.page.identifier = 'mediinfo-mbti'; 
            };
            (function() { 
                var d = document, s = d.createElement('script');
                s.src = 'https://jh8571.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
            })();
        </script>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2026 MediInfo. All rights reserved.</p>
            <div class="footer-links">
                <a href="about.html">소개</a>
                <a href="privacy.html">개인정보처리방침</a>
                <a href="terms.html">이용약관</a>
            </div>
        </div>
    </footer>

    <script src="mbti.js"></script>
    <script src="theme.js"></script>
</body>
</html>
