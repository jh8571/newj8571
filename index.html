                <a href="animal.html" data-ko="동물 AI" data-en="Animal AI">동물 AI</a>
                <a href="blog.html" data-ko="건강 가이드" data-en="Health Guide">건강 가이드</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="ai-hero">
            <div class="container">
                <h2 style="font-size: 3rem; font-weight: 900; color: white; margin-bottom: 20px;" data-ko="프리미엄 영양 AI" data-en="Premium Nutrient AI">프리미엄 영양 AI</h2>
                <p style="color: rgba(255,255,255,0.6);" data-ko="임상 데이터와 인공지능을 결합한 당신만의 최적화된 영양 설계" data-en="Optimized nutritional design combining clinical data and AI.">임상 데이터와 인공지능을 결합한 당신만의 최적화된 영양 설계</p>
            </div>
        </section>

        <div class="container">
            <div class="premium-card">
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; margin-bottom: 40px;">
                    <div class="input-field">
                        <label data-ko="생물학적 성별" data-en="Biological Sex">생물학적 성별</label>
                        <div style="display: flex; gap: 10px;">
                            <button class="select-btn active" onclick="setGender('male')" id="gender-male" data-ko="남성" data-en="Male">남성</button>
                            <button class="select-btn" onclick="setGender('female')" id="gender-female" data-ko="여성" data-en="Female">여성</button>
                        </div>
                    </div>
                    <div class="input-field">
                        <label data-ko="연령대" data-en="Life Stage">연령대</label>
                        <select id="age-range">
                            <option value="teen" data-ko="청소년" data-en="Teen">청소년</option>
                            <option value="young" selected data-ko="청년" data-en="Young Adult">청년</option>
                            <option value="middle" data-ko="중년" data-en="Middle Age">중년</option>
                            <option value="senior" data-ko="노년" data-en="Senior">노년</option>
                        </select>
                    </div>
                    <div class="input-field">
                        <label data-ko="핵심 건강 고민" data-en="Primary Concern">핵심 건강 고민</label>
                        <select id="health-concern">
                            <option value="fatigue" data-ko="피로" data-en="Fatigue">피로</option>
                            <option value="eye" data-ko="시력" data-en="Vision">시력</option>
                            <option value="immune" data-ko="면역" data-en="Immune">면역</option>
                            <option value="bone" data-ko="뼈/관절" data-en="Bone/Joint">뼈/관절</option>
                            <option value="liver" data-ko="간/해독" data-en="Liver">간/해독</option>
                            <option value="brain" data-ko="인지능력" data-en="Cognitive">인지능력</option>
                        </select>
                    </div>
                </div>
                <button class="luxury-btn" onclick="analyzeNutrition()" data-ko="분석 리포트 생성" data-en="Generate Report">분석 리포트 생성</button>
            </div>

            <!-- ID matches main.js -->
            <div id="ai-result-section" style="display: none; margin-top: 80px;">
                <div id="ai-result-content"></div>
            </div>

            <!-- Database Search -->
            <section style="margin-top: 120px; padding-bottom: 80px;">
                <h2 style="text-align:center; font-size:2rem; margin-bottom:40px;" data-ko="의학 데이터베이스 검색" data-en="Clinical Database Search">의학 데이터베이스 검색</h2>
                <div style="max-width: 700px; margin: 0 auto; position: relative;">
                    <input type="text" id="search-input" data-ko-ph="성분명을 입력하세요" data-en-ph="Enter Ingredient" placeholder="성분명을 입력하세요" style="width:100%; padding:20px; border-radius:50px; border:1px solid #ddd; outline:none;">
                    <button id="search-btn" style="position:absolute; right:10px; top:10px; bottom:10px; padding:0 30px; background:#0f172a; color:white; border:none; border-radius:40px; font-weight:800; cursor:pointer;" data-ko="검색" data-en="Search">검색</button>
                </div>
                <div id="drug-list" class="drug-list" style="margin-top:50px;"></div>
            </section>
        </div>
    </main>

    <!-- Modal for main.js -->
    <div id="drug-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>
