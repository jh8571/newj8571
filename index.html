<!DOCTYPE html>
<html lang="ko">
<head>
    <meta name="google-adsense-account" content="ca-pub-9103697866666926">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9103697866666926" crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediInfo - 프리미엄 의약품 정보 센터</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>MediInfo</h1>
            <p>신뢰할 수 있는 정밀 의약품 정보를 검색하세요.</p>
            <nav>
                <a href="index.html" class="active">의약품 검색</a>
                <a href="psychology.html">심리테스트</a>
                <a href="mbti.html">MBTI 테스트</a>
                <a href="games.html">게임</a>
                <a href="animal.html">동물 AI</a>
                <a href="blog.html">건강 가이드</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <div class="search-container">
            <input type="text" id="search-input" placeholder="약품명, 성분명, 제조사 등으로 검색...">
            <button id="search-btn"><i class="fas fa-search"></i> 검색</button>
        </div>
    </div>

    <main class="container">
        <div id="welcome-message" class="no-results">
            <i class="fas fa-pills"></i>
            <h3>검색어를 입력해 주세요</h3>
            <p>국내 유통되는 모든 의약품 정보를 성분, 효능, 보관법까지 상세하게 제공합니다.</p>
        </div>

        <div id="results-section" style="display:none;">
            <div class="category-tabs" style="display:flex; justify-content:center; gap:10px; margin-bottom:30px;">
                <button class="cat-btn active" data-category="전체" style="padding:8px 16px; border-radius:20px; border:1px solid #ddd; background:white; cursor:pointer;">전체</button>
                <button class="cat-btn" data-category="전문의약품" style="padding:8px 16px; border-radius:20px; border:1px solid #ddd; background:white; cursor:pointer;">전문의약품</button>
                <button class="cat-btn" data-category="일반의약품" style="padding:8px 16px; border-radius:20px; border:1px solid #ddd; background:white; cursor:pointer;">일반의약품</button>
                <button class="cat-btn" data-category="건강기능식품" style="padding:8px 16px; border-radius:20px; border:1px solid #ddd; background:white; cursor:pointer;">건강기능식품</button>
            </div>
            <div id="drug-list" class="drug-grid">
                <!-- Results -->
            </div>
        </div>
    </main>

    <!-- Partnership Inquiry Section -->
    <section class="container" style="margin-top: 80px; border-top: 1px solid #eee; padding-top: 60px;">
        <div style="max-width: 600px; margin: 0 auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
            <h2 style="text-align: center; margin-bottom: 30px; color: var(--secondary-color);">제휴 문의</h2>
            <form action="https://formspree.io/f/xaqpzkaj" method="POST">
                <div style="margin-bottom: 20px;">
                    <label style="display:block; margin-bottom:8px; font-weight:600;">성함 / 업체명</label>
                    <input type="text" name="name" required style="width:100%; padding:12px; border:1px solid #ddd; border-radius:8px; outline:none;">
                </div>
                <div style="margin-bottom: 20px;">
                    <label style="display:block; margin-bottom:8px; font-weight:600;">이메일 주소</label>
                    <input type="email" name="_replyto" required style="width:100%; padding:12px; border:1px solid #ddd; border-radius:8px; outline:none;">
                </div>
                <div style="margin-bottom: 20px;">
                    <label style="display:block; margin-bottom:8px; font-weight:600;">문의 내용</label>
                    <textarea name="message" required style="width:100%; padding:12px; border:1px solid #ddd; border-radius:8px; height:120px; outline:none; resize:none;"></textarea>
                </div>
                <button type="submit" style="width:100%; background:var(--primary-color); color:white; border:none; padding:15px; border-radius:8px; font-weight:700; cursor:pointer; font-size:1.1rem;">문의 보내기</button>
            </form>
        </div>
    </section>

    <!-- Comments Section -->
    <section class="container" style="margin-top: 80px; padding-bottom: 40px;">
        <div id="disqus_thread" style="background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);"></div>
        <script>
            var disqus_config = function () {
                this.page.url = window.location.href;  
                this.page.identifier = 'mediinfo-main'; 
            };
            (function() { 
                var d = document, s = d.createElement('script');
                s.src = 'https://jh8571.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
            })();
        </script>
        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </section>

    <!-- Detail Modal -->
    <div id="drug-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="modal-body">
                <!-- Details -->
            </div>
        </div>
    </div>

    <footer>
        <div class="container">
            <p>&copy; 2026 MediInfo. All rights reserved.</p>
            <div class="footer-links">
                <a href="about.html">소개</a>
                <a href="privacy.html">개인정보처리방침</a>
                <a href="terms.html">이용약관</a>
            </div>
        </div>
    </footer>

    <script src="main.js"></script>
    <script src="theme.js"></script>
</body>
</html>
