            <a href="index.html" class="logo" data-ko="VitalRest" data-en="VitalRest">VitalRest</a>

                <button id="lang-toggle" class="control-btn">EN</button>

            <a href="blog.html" data-ko="건강가이드" data-en="Health Blog">건강가이드</a>
        </nav>
    </header>

    <main class="container">
        <section class="hero">
            <h2 data-ko="당신만을 위한 건강한 쉼표" data-en="A Healthy Comma for You">당신만을 위한 건강한 쉼표</h2>
            <p data-ko="임상 데이터와 인공지능이 제안하는 프리미엄 영양 솔루션을 경험해 보세요." data-en="Experience premium nutritional solutions proposed by clinical data and AI.">임상 데이터와 인공지능이 제안하는 프리미엄 영양 솔루션을 경험해 보세요.</p>
        </section>

        <div style="max-width: 800px; margin: 0 auto;">
            <!-- Premium Gender Selection -->
            <div class="selection-grid">
                <div class="selectable-card active" onclick="setGender('male')" id="gender-male">
                    <i class="fas fa-mars"></i>
                    <span data-ko="남성" data-en="Male">남성</span>
                </div>
                <div class="selectable-card" onclick="setGender('female')" id="gender-female">
                    <i class="fas fa-venus"></i>
                    <span data-ko="여성" data-en="Female">여성</span>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="input-field">
                    <label style="font-weight: 800; font-size: 0.9rem; color: var(--text-muted);" data-ko="연령대 선택" data-en="Life Stage">연령대 선택</label>
                    <select id="age-range">
                        <option value="teen" data-ko="청소년 (10대)" data-en="Adolescence">청소년 (10대)</option>
                        <option value="young" selected data-ko="청년 (20-30대)" data-en="Young Adult">청년 (20-30대)</option>
                        <option value="middle" data-ko="중년 (40-50대)" data-en="Middle Age">중년 (40-50대)</option>
                        <option value="senior" data-ko="노년 (60대 이상)" data-en="Senior">노년 (60대 이상)</option>
                    </select>
                </div>
                <div class="input-field">
                    <label style="font-weight: 800; font-size: 0.9rem; color: var(--text-muted);" data-ko="주요 건강 고민" data-en="Health Concern">주요 건강 고민</label>
                    <select id="health-concern">
                        <option value="fatigue" data-ko="만성 피로" data-en="Chronic Fatigue">만성 피로</option>
                        <option value="eye" data-ko="시력 보호" data-en="Vision Care">시력 보호</option>
                        <option value="immune" data-ko="면역력 강화" data-en="Immunity">면역력 강화</option>
                        <option value="bone" data-ko="뼈/관절 건강" data-en="Bone & Joint">뼈/관절 건강</option>
                        <option value="liver" data-ko="간 기능/해독" data-en="Liver Detox">간 기능/해독</option>
                        <option value="brain" data-ko="기억력/집중력" data-en="Cognitive Health">기억력/집중력</option>
                    </select>
                </div>
            </div>

            <button class="luxury-btn" onclick="analyzeNutrition()" data-ko="분석 리포트 생성하기" data-en="Generate Analysis Report">분석 리포트 생성하기</button>
        </div>

        <div id="ai-result-section" style="display: none; margin-top: 80px;">
            <div id="ai-result-content"></div>
        </div>

        <!-- Integrated Search -->
        <section style="margin-top: 150px; text-align: center;">
            <h3 style="font-size: 2.2rem; font-weight: 900; margin-bottom: 15px;" data-ko="프리미엄 성분 백과사전" data-en="Premium Ingredient Encyclopedia">프리미엄 성분 백과사전</h3>
            <p style="color: var(--text-muted); margin-bottom: 40px; font-size: 1.1rem;" data-ko="궁금한 영양 성분이나 증상을 검색하여 상세한 효능과 주의사항을 확인하세요." data-en="Search for nutritional ingredients or symptoms to check detailed benefits and cautions.">궁금한 영양 성분이나 증상을 검색하여 상세한 효능과 주의사항을 확인하세요.</p>
            <div style="max-width: 700px; margin: 0 auto; position: relative;">
                <input type="text" id="search-input" data-ko-ph="성분명 (예: 오메가3, 비타민C) 또는 증상 검색..." data-en-ph="Search by ingredient (e.g. Omega-3) or symptom..." placeholder="성분명 (예: 오메가3, 비타민C) 또는 증상 검색..." style="padding-right: 120px; border-radius: 50px;">
                <button id="search-btn" style="position: absolute; right: 8px; top: 18px; bottom: 8px; padding: 0 30px; background: var(--primary-color); color: white; border: none; border-radius: 40px; font-weight: 800; cursor: pointer;" data-ko="분석" data-en="Analyze">분석</button>
            </div>
            <div id="drug-list" class="drug-list" style="margin-top: 60px;"></div>
        </section>
    </main>

    <div id="drug-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="modal-body"></div>
        </div>
