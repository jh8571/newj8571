    <main>
        <!-- Premium AI Hero -->
        <section class="ai-hero">
            <div class="container">
                <div style="text-align: center; margin-bottom: 60px;">
                    <h2 style="font-size: 3rem; font-weight: 900; color: white; letter-spacing: -2px; margin-bottom: 20px;" data-ko="프리미엄 영양 AI" data-en="Premium Nutrient AI">프리미엄 영양 AI</h2>

                        임상 데이터와 인공지능 알고리즘을 결합하여 당신만의 최적화된 영양 설계를 제안합니다.
                    </p>
                </div>

                <div class="ai-input-card">
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 40px; margin-bottom: 40px;">
                        <div class="input-field">
                            <label style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; margin-bottom: 15px; display: block; font-weight: 800;" data-ko="생물학적 성별" data-en="Biological Sex">생물학적 성별</label>
                            <div style="display: flex; gap: 10px;">
                                <button class="select-btn active" onclick="setGender('male')" id="gender-male" style="flex:1;" data-ko="남성" data-en="Male">남성</button>
                                <button class="select-btn" onclick="setGender('female')" id="gender-female" style="flex:1;" data-ko="여성" data-en="Female">여성</button>
                            </div>
                        </div>
                        <div class="input-field">
                            <label style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; margin-bottom: 15px; display: block; font-weight: 800;" data-ko="연령대" data-en="Life Stage">연령대</label>

                                <option value="teen" data-ko="청소년 (10대)" data-en="Adolescence">청소년 (10대)</option>
                                <option value="young" selected data-ko="청년 (20-30대)" data-en="Young Adult">청년 (20-30대)</option>
                                <option value="middle" data-ko="중년 (40-50대)" data-en="Middle Age">중년 (40-50대)</option>

                        </div>
                        <div class="input-field">

                                <option value="eye" data-ko="시력 및 안구 건강" data-en="Vision & Eye Health">시력 및 안구 건강</option>

                                <option value="bone" data-ko="뼈 및 관절 건강" data-en="Bone & Joint">뼈 및 관절 건강</option>
                                <option value="liver" data-ko="간 건강 및 해독" data-en="Liver & Detox">간 건강 및 해독</option>
                                <option value="brain" data-ko="인지 능력 강화" data-en="Cognitive Function">인지 능력 강화</option>

                    <button onclick="analyzeNutrition()" style="width:100%; padding:22px; background: #0f172a; color:white; border:none; border-radius:16px; font-size:1.1rem; font-weight:900; cursor:pointer; letter-spacing: 1px; transition: 0.3s;" data-ko="프리미엄 분석 리포트 생성" data-en="Generate Premium Analysis">프리미엄 분석 리포트 생성</button>
