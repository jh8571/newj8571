        .res-btn.primary { background: var(--accent-color); color: var(--primary-color); }

    const DIFF_MULT   = { easy: 1.0, medium: 1.5, hard: 2.0 };
    const DIFF_LABEL  = { easy: '쉬움', medium: '보통', hard: '어려움' };
    const MAX_TIME    = 20; // seconds
    const Q_PER_SESS  = 10;

    /* ── Category definitions ─────────────────────────────────── */
    const KO_CATS = [
        { key:'kpolitics', label:'한국 정치', icon:'🗳️', color:'#6366f1' },
        { key:'wpolitics', label:'세계 정치', icon:'🌐', color:'#8b5cf6' },
        { key:'keconomy',  label:'한국 경제', icon:'💰', color:'#10b981' },
        { key:'weconomy',  label:'세계 경제', icon:'📈', color:'#059669' },
        { key:'ksociety',  label:'한국 사회', icon:'🏘️', color:'#f59e0b' },
        { key:'wsociety',  label:'세계 사회', icon:'🌏', color:'#d97706' },
        { key:'khistory',  label:'한국사',    icon:'📜', color:'#ef4444' },
        { key:'whistory',  label:'세계사',    icon:'🏛️', color:'#dc2626' },
        { key:'science',   label:'과학',      icon:'🔬', color:'#06b6d4' },
        { key:'it',        label:'IT·기술',   icon:'💻', color:'#3b82f6' },
    ];
    const API_CATS = [
        { key:'general',   label:'일반 상식', icon:'🎯', color:'#84cc16', apiId:9  },
        { key:'sports',    label:'스포츠',    icon:'⚽', color:'#22c55e', apiId:21 },
        { key:'geography', label:'지리',      icon:'🗺️', color:'#14b8a6', apiId:22 },
        { key:'music',     label:'음악',      icon:'🎵', color:'#a855f7', apiId:12 },
        { key:'math',      label:'수학',      icon:'➕', color:'#ec4899', apiId:19 },
        { key:'myth',      label:'신화',      icon:'⚡', color:'#f97316', apiId:20 },
        { key:'art',       label:'예술',      icon:'🎨', color:'#e11d48', apiId:25 },
        { key:'film',      label:'영화',      icon:'🎬', color:'#7c3aed', apiId:11 },
        { key:'nature',    label:'자연과학',  icon:'🌿', color:'#16a34a', apiId:17 },
        { key:'computer',  label:'컴퓨터',    icon:'🖥️', color:'#2563eb', apiId:18 },
    ];
    const ALL_CATS = [...KO_CATS, ...API_CATS];
    const CAT_MAP  = Object.fromEntries(ALL_CATS.map(c => [c.key, c]));

    /* ── State ────────────────────────────────────────────────── */
    let selCatKey   = null;
    let selDiff     = null;
    let questions   = [];
    let qIdx        = 0;
    let score       = 0;
    let timerId     = null;
    let timeLeft    = MAX_TIME;
    let answered    = false;
    let correctCount = 0;
    let totalTimeBonus = 0;
    let totalBase   = 0;

    /* ── Utilities ────────────────────────────────────────────── */
    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length-1; i > 0; i--) {
            const j = Math.floor(Math.random()*(i+1));
            [a[i],a[j]] = [a[j],a[i]];
        }
        return a;
    }
    function decodeHtml(html) {
        const el = document.createElement('textarea');
        el.innerHTML = html;
        return el.value;
    }
    function show(id)   { document.getElementById(id).style.display=''; }
    function hide(id)   { document.getElementById(id).style.display='none'; }
    function el(id)     { return document.getElementById(id); }
    function isApi(key) { return API_CATS.some(c => c.key === key); }

    /* ── Category grid render ─────────────────────────────────── */
    function renderCatGrid() {
        function cardHtml(cat, isApiCat) {
            const koData = !isApiCat && typeof QUIZ_KO !== 'undefined' && QUIZ_KO[cat.key];
            const eCnt = koData ? koData.easy.length   : '30+';
            const mCnt = koData ? koData.medium.length : '30+';
            const hCnt = koData ? koData.hard.length   : '30+';
            const engBadge = isApiCat ? `<span class="diff-tag api">ENG</span>` : '';
            return `
            <div class="cat-card" onclick="openDiff('${cat.key}')" tabindex="0"
                 onkeydown="if(event.key==='Enter')openDiff('${cat.key}')">
                <div class="cat-card-accent" style="background:${cat.color};"></div>
                <span class="cat-card-icon">${cat.icon}</span>
                <div class="cat-card-name">${cat.label}</div>
                <div class="cat-card-tags">
                    <span class="diff-tag easy">${eCnt}</span>
                    <span class="diff-tag medium">${mCnt}</span>
                    <span class="diff-tag hard">${hCnt}</span>
                    ${engBadge}
                </div>
            </div>`;
        }
        el('ko-grid').innerHTML  = KO_CATS.map(c => cardHtml(c, false)).join('');
        el('api-grid').innerHTML = API_CATS.map(c => cardHtml(c, true)).join('');
    }

    /* ── Difficulty overlay ───────────────────────────────────── */
    function openDiff(key) {
        selCatKey = key;
        const cat = CAT_MAP[key];
        el('dm-icon').textContent  = cat.icon;
        el('dm-title').textContent = cat.label;
        el('dm-sub').textContent   = isApi(key) ? 'Open Trivia DB · 영어 문제' : '한국어 문제은행';

        const koData = !isApi(key) && typeof QUIZ_KO !== 'undefined' && QUIZ_KO[key];
        el('dm-easy-cnt').textContent  = koData ? `(${koData.easy.length}문제)`   : '(30문제)';
        el('dm-med-cnt').textContent   = koData ? `(${koData.medium.length}문제)` : '(30문제)';
        el('dm-hard-cnt').textContent  = koData ? `(${koData.hard.length}문제)`   : '(30문제)';

        const modal = el('diff-modal');
        modal.classList.remove('pop');
        void modal.offsetWidth;
        modal.classList.add('pop');
        show('v-diff');
    }
    function closeDiff() { hide('v-diff'); }
    el('v-diff').addEventListener('click', e => { if (e.target === el('v-diff')) closeDiff(); });

    /* ── Start quiz ───────────────────────────────────────────── */
    async function startQuiz(difficulty) {
        selDiff = difficulty;
        hide('v-diff');
        hide('v-cats');
        show('v-loading');
        el('loading-msg').textContent = '문제를 불러오는 중...';

        try {
            if (isApi(selCatKey)) {
                questions = await fetchApiQuestions(selCatKey, difficulty);
            } else {
                questions = getKoQuestions(selCatKey, difficulty);
            }
        } catch(e) {
            hide('v-loading');
            show('v-cats');
            alert('문제를 불러오지 못했습니다. 잠시 후 다시 시도해주세요.');
            return;
        }

        if (!questions || questions.length === 0) {
            hide('v-loading');
            show('v-cats');
            alert('이 난이도의 문제가 없습니다.');
            return;
        }

        questions = shuffle(questions).slice(0, Q_PER_SESS);
        qIdx = 0; score = 0; correctCount = 0; totalTimeBonus = 0; totalBase = 0;

        hide('v-loading');
        show('v-quiz');
        renderQuestion();
    }

    /* ── Korean questions ─────────────────────────────────────── */
    function getKoQuestions(key, difficulty) {
        if (typeof QUIZ_KO === 'undefined') return [];
        const cat = QUIZ_KO[key];
        if (!cat) return [];
        return (cat[difficulty] || []).map(q => ({
            q: q.q,
            o: q.o,
            a: q.a,
            e: q.e || ''
        }));
    }

    /* ── API questions ────────────────────────────────────────── */
    async function fetchApiQuestions(key, difficulty) {
        const cacheKey = `qz_api_${key}_${difficulty}`;
        const cached   = sessionStorage.getItem(cacheKey);
        if (cached) {
            const parsed = JSON.parse(cached);
            if (parsed.length > 0) return shuffle(parsed);
        }

        const cat    = CAT_MAP[key];
        const apiDiff = difficulty; // easy | medium | hard
        const url    = `https://opentdb.com/api.php?amount=30&category=${cat.apiId}&difficulty=${apiDiff}&type=multiple`;

        const res  = await fetch(url);
        const data = await res.json();

        if (data.response_code !== 0 || !data.results) {
            // Fallback: fetch without difficulty filter
            const res2  = await fetch(`https://opentdb.com/api.php?amount=30&category=${cat.apiId}&type=multiple`);
            const data2 = await res2.json();
            if (data2.response_code !== 0) throw new Error('API error');
            const qs = data2.results.map(processApiQ);
            sessionStorage.setItem(cacheKey, JSON.stringify(qs));
            return qs;
        }

        const qs = data.results.map(processApiQ);
        sessionStorage.setItem(cacheKey, JSON.stringify(qs));
        return qs;
    }

    function processApiQ(apiQ) {
        const opts  = shuffle([apiQ.correct_answer, ...apiQ.incorrect_answers]);
        const ansIdx = opts.indexOf(apiQ.correct_answer);
        return {
            q: decodeHtml(apiQ.question),
            o: opts.map(decodeHtml),
            a: ansIdx,
            e: ''
        };
    }

    /* ── Render question ──────────────────────────────────────── */
    function renderQuestion() {
        answered = false;
        timeLeft = MAX_TIME;

        const cat = CAT_MAP[selCatKey];
        const q   = questions[qIdx];
        const pct = (qIdx / questions.length) * 100;

        el('qz-cat-label').textContent = `${cat.icon} ${cat.label} · ${DIFF_LABEL[selDiff]}`;
        el('qz-score').textContent     = score.toLocaleString();
        el('qz-prog-fill').style.width = pct + '%';
        el('qz-prog-label').textContent = `${qIdx+1} / ${questions.length}`;
        el('qz-question').textContent  = q.q;

        el('qz-explain').textContent = q.e;
        el('qz-explain').className   = 'qz-explain';
        el('qz-next').className      = 'qz-next';
        el('qz-next').textContent    = qIdx < questions.length-1 ? '다음 문제 →' : '결과 보기 →';

        // Options
        const letters = ['A','B','C','D'];
        el('qz-options').innerHTML = q.o.map((opt, i) => `
            <button class="qz-opt" onclick="selectAnswer(${i})" id="qz-opt-${i}">
                <span class="qz-opt-letter">${letters[i]}</span>
                <span>${opt}</span>
            </button>
        `).join('');

        // Timer
        el('qz-timer-fill').style.transition = 'none';
        el('qz-timer-fill').style.width = '100%';
        el('qz-timer-fill').style.background = 'linear-gradient(90deg,#10b981,#f59e0b)';
        el('qz-timer-label').textContent = `⏱ ${MAX_TIME}초`;

        clearInterval(timerId);
        void el('qz-timer-fill').offsetWidth;
        el('qz-timer-fill').style.transition = 'width 1s linear';

        timerId = setInterval(() => {
            timeLeft--;
            el('qz-timer-label').textContent = `⏱ ${timeLeft}초`;
            el('qz-timer-fill').style.width  = (timeLeft / MAX_TIME * 100) + '%';
            if (timeLeft <= 7)  el('qz-timer-fill').style.background = '#ef4444';
            else if (timeLeft <= 13) el('qz-timer-fill').style.background = '#f59e0b';
            if (timeLeft <= 0) { clearInterval(timerId); timeExpired(); }
        }, 1000);
    }

    /* ── Answer logic ─────────────────────────────────────────── */
    function selectAnswer(idx) {
        if (answered) return;
        answered = true;
        clearInterval(timerId);

        const q        = questions[qIdx];
        const isRight  = idx === q.a;
        const mult     = DIFF_MULT[selDiff];
        const timeBonus = isRight ? Math.floor((timeLeft / MAX_TIME) * 50 * mult) : 0;
        const base      = isRight ? Math.round(100 * mult) : 0;

        score += base + timeBonus;
        if (isRight) { correctCount++; totalBase += base; totalTimeBonus += timeBonus; }

        el('qz-score').textContent = score.toLocaleString();

        // Highlight options
        const opts = el('qz-options').querySelectorAll('.qz-opt');
        opts.forEach((btn, i) => {
            btn.disabled = true;
            if (i === q.a) btn.classList.add('correct');
            else if (i === idx && !isRight) btn.classList.add('wrong');
        });

        if (q.e) el('qz-explain').classList.add('show');
        el('qz-next').classList.add('show');
    }

    function timeExpired() {
        if (answered) return;
        answered = true;
        const q = questions[qIdx];
        const opts = el('qz-options').querySelectorAll('.qz-opt');
        opts.forEach((btn, i) => {
            btn.disabled = true;
            if (i === q.a) btn.classList.add('correct');
        });
        if (q.e) el('qz-explain').classList.add('show');
        el('qz-next').classList.add('show');
        el('qz-timer-label').textContent = '⏱ 시간 초과!';
    }

    function nextQuestion() {
        qIdx++;
        if (qIdx >= questions.length) { showResult(); return; }
        renderQuestion();
    }

    /* ── Show categories ──────────────────────────────────────── */
    function showCategories() {
        clearInterval(timerId);
        hide('v-quiz'); hide('v-result'); hide('v-loading'); hide('v-diff');
        show('v-cats');
    }
    window.showCategories = showCategories;

    function replayQuiz() { startQuiz(selDiff); }
    window.replayQuiz = replayQuiz;

    /* ── Result ───────────────────────────────────────────────── */
    async function showResult() {
        clearInterval(timerId);
        hide('v-quiz');
        show('v-result');

        const accPct = Math.round(correctCount / questions.length * 100);

        // Animate score count-up
        let displayed = 0;
        const target  = score;
        const step    = Math.max(1, Math.round(target / 40));
        const counter = setInterval(() => {
            displayed = Math.min(displayed + step, target);
            el('res-score').textContent = displayed.toLocaleString();
            if (displayed >= target) clearInterval(counter);
        }, 30);

        el('res-label').textContent   = `점 · ${correctCount}/${questions.length} 정답 (${accPct}%)`;
        el('res-acc-text').textContent = `${correctCount}/${questions.length} 정답`;
        setTimeout(() => { el('res-acc-fill').style.width = accPct + '%'; }, 100);

        const mult = DIFF_MULT[selDiff];
        el('res-breakdown').innerHTML = [
            { label: '정답 기본점수', val: totalBase.toLocaleString() + '점' },
            { label: '속도 보너스',   val: '+' + totalTimeBonus.toLocaleString() + '점' },
            { label: '난이도 배율',   val: `×${mult} (${DIFF_LABEL[selDiff]})` },
            { label: '최종 점수',     val: score.toLocaleString() + '점', bold: true },
        ].map(r => `
            <div class="res-row">
                <span style="color:var(--text-muted);">${r.label}</span>
                <span class="res-row-val" style="${r.bold?'color:var(--accent-color);font-size:1.1rem;':''}">
                    ${r.val}
                </span>
            </div>`).join('');

        el('res-replay').textContent = `🔄 ${CAT_MAP[selCatKey].label} 다시 도전`;

        // Save score (toast notification handled by firebase-auth.js)
        if (score > 0 && window.vgSaveGame) {
            try { await window.vgSaveGame('quiz_' + selCatKey, score); } catch(e) {}
        }

        // Load leaderboard
        loadResultLB();
    }

    async function loadResultLB() {
        if (!window.vgGetLeaderboard) return;
        try {
            const top = await window.vgGetLeaderboard('quiz_' + selCatKey);
            if (!top || top.length === 0) return;
            const medals = ['🥇','🥈','🥉'];
            el('res-lb-list').innerHTML = top.slice(0,5).map((e,i) => `
                <div class="lb-row">
                    <span class="lb-rank">${i<3?medals[i]:(i+1)+'위'}</span>
                    <span class="lb-name">${e.name || '익명'}</span>
                    <span class="lb-score">${(e.score||0).toLocaleString()}점</span>
                </div>`).join('');
            show('res-lb-card');
        } catch(e) {}
    }

    /* ── Init ─────────────────────────────────────────────────── */
    renderCatGrid();

    // URL deep-link: ?cat=khistory&diff=hard
    (function checkUrlParams() {
        const p    = new URLSearchParams(location.search);
        const cat  = p.get('cat');
        const diff = p.get('diff');
        if (cat && CAT_MAP[cat] && diff && DIFF_MULT[diff]) {
            selCatKey = cat;
            startQuiz(diff);
        }
    })();
    </script>
</body>
</html>
