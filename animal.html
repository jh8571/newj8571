    <script type="text/javascript">
        const URL = "https://teachablemachine.withgoogle.com/models/31Ab0XZ7s/";
        let model, labelContainer, maxPredictions;

        async function loadModel() {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();
        }

        loadModel();

        async function handleFileUpload(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                const preview = document.getElementById('image-preview');
                const loadingText = document.getElementById('loading-text');
                
                reader.onload = async function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    loadingText.style.display = 'block';
                    document.getElementById('label-container').innerHTML = '';
                    
                    preview.onload = async function() {
                        await predict(preview);
                        loadingText.style.display = 'none';
                    };
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function predict(imageElement) {
            if (!model) await loadModel();
            const prediction = await model.predict(imageElement);
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = '';
            
            for (let i = 0; i < maxPredictions; i++) {
                const prob = (prediction[i].probability * 100).toFixed(0);
                const div = document.createElement("div");
                div.style.display = 'flex';
                div.style.alignItems = 'center';
                div.style.gap = '15px';
                div.innerHTML = `
                    <span style="width: 80px; font-weight: 800; text-align: left;">${prediction[i].className}</span>
                    <div style="flex: 1; height: 12px; background: var(--border-color); border-radius: 10px; overflow: hidden;">
                        <div style="width: ${prob}%; height: 100%; background: var(--accent-color); border-radius: 10px; transition: width 0.8s;"></div>
                    </div>
                    <span style="width: 50px; font-weight: 800; text-align: right;">${prob}%</span>
                `;
                labelContainer.appendChild(div);
            }
        }
    </script>
