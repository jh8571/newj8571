<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동물 상 분류 AI - MediInfo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .ai-container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
        }
        .upload-area {
            border: 2px dashed #e2e8f0;
            padding: 40px;
            border-radius: 20px;
            margin-bottom: 30px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        .upload-area:hover {
            border-color: var(--primary-color);
            background: #f8fafc;
        }
        #image-preview {
            max-width: 100%;
            max-height: 400px;
            border-radius: 15px;
            display: none;
            margin: 0 auto 20px;
        }
        #label-container {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }
        .prediction-bar {
            width: 100%;
            max-width: 400px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .bar-bg {
            flex: 1;
            height: 15px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            background: var(--primary-color);
            width: 0%;
            transition: width 0.5s;
        }
        .label-text {
            width: 80px;
            font-weight: 700;
            text-align: left;
        }
        .percent-text {
            width: 50px;
            font-weight: 600;
            text-align: right;
        }
        .file-input {
            display: none;
        }
        .upload-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-btn:hover {
            background: var(--secondary-color);
        }
        #loading-text {
            display: none;
            margin-top: 20px;
            color: var(--primary-color);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>동물 상 분류 AI</h1>
            <p>사진을 업로드하여 당신이 어떤 동물을 닮았는지 확인해 보세요.</p>
            <nav>
                <a href="index.html">의약품 검색</a>
                <a href="psychology.html">심리테스트</a>
                <a href="mbti.html">MBTI 테스트</a>
                <a href="games.html">게임</a>
                <a href="animal.html" class="active">동물 AI</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="ai-container">
            <i class="fas fa-file-upload" style="font-size: 3rem; color: var(--primary-color); margin-bottom: 20px;"></i>
            <h2>동물 상 분석하기</h2>
            <p style="color: var(--text-muted); margin-bottom: 30px;">
                사진을 선택하거나 이곳에 드래그하여 놓아주세요.<br>
                AI가 개, 고양이, 너구리 중 가장 닮은 유형을 분석합니다.
            </p>
            
            <div class="upload-area" onclick="document.getElementById('file-input').click()">
                <img id="image-preview" src="" alt="Preview">
                <div id="upload-placeholder">
                    <i class="fas fa-images" style="font-size: 2rem; color: #cbd5e1; margin-bottom: 10px;"></i>
                    <p>클릭하여 사진 업로드</p>
                </div>
            </div>
            
            <input type="file" id="file-input" class="file-input" accept="image/*" onchange="handleFileUpload(this)">
            
            <div id="loading-text"><i class="fas fa-spinner fa-spin"></i> 분석 중...</div>
            <div id="label-container"></div>
        </div>

        <!-- Comments Section -->
        <section style="margin-top: 60px; padding-bottom: 40px;">
            <div id="disqus_thread" style="background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);"></div>
            <script>
                var disqus_config = function () {
                    this.page.url = window.location.href;  
                    this.page.identifier = 'mediinfo-animal-v2'; 
                };
                (function() { 
                    var d = document, s = d.createElement('script');
                    s.src = 'https://jh8571.disqus.com/embed.js';
                    s.setAttribute('data-timestamp', +new Date());
                    (d.head || d.body).appendChild(s);
                })();
            </script>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 MediInfo. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script type="text/javascript">
        const URL = "https://teachablemachine.withgoogle.com/models/31Ab0XZ7s/";
        let model, labelContainer, maxPredictions;

        // Load the model once
        async function loadModel() {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();
        }

        loadModel();

        async function handleFileUpload(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                const preview = document.getElementById('image-preview');
                const placeholder = document.getElementById('upload-placeholder');
                const loadingText = document.getElementById('loading-text');
                
                reader.onload = async function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    placeholder.style.display = 'none';
                    
                    loadingText.style.display = 'block';
                    document.getElementById('label-container').innerHTML = '';
                    
                    // Wait for image to load
                    preview.onload = async function() {
                        await predict(preview);
                        loadingText.style.display = 'none';
                    };
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function predict(imageElement) {
            if (!model) await loadModel();
            
            const prediction = await model.predict(imageElement);
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = '';
            
            for (let i = 0; i < maxPredictions; i++) {
                const prob = (prediction[i].probability * 100).toFixed(0);
                const div = document.createElement("div");
                div.className = "prediction-bar";
                div.innerHTML = `
                    <span class="label-text">${prediction[i].className}</span>
                    <div class="bar-bg"><div class="bar-fill" style="width: ${prob}%"></div></div>
                    <span class="percent-text">${prob}%</span>
                `;
                labelContainer.appendChild(div);
            }
        }
    </script>
</body>
</html>
