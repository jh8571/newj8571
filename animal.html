<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동물 상 분류 AI - MediInfo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .ai-container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
        }
        #webcam-container {
            margin: 20px auto;
            border-radius: 20px;
            overflow: hidden;
            width: 200px;
            height: 200px;
            border: 4px solid var(--primary-color);
            background: #f8fafc;
        }
        #label-container {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }
        .prediction-bar {
            width: 100%;
            max-width: 400px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .bar-bg {
            flex: 1;
            height: 15px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            background: var(--primary-color);
            width: 0%;
            transition: width 0.3s;
        }
        .label-text {
            width: 80px;
            font-weight: 700;
            text-align: left;
        }
        .percent-text {
            width: 50px;
            font-weight: 600;
            text-align: right;
        }
        .start-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 30px;
        }
        .start-btn:hover {
            background: var(--secondary-color);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>동물 상 분류 AI</h1>
            <p>카메라를 비추어 당신이 어떤 동물을 닮았는지 확인해 보세요.</p>
            <nav>
                <a href="index.html">의약품 검색</a>
                <a href="psychology.html">심리테스트</a>
                <a href="mbti.html">MBTI 테스트</a>
                <a href="games.html">게임</a>
                <a href="animal.html" class="active">동물 AI</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="ai-container">
            <i class="fas fa-camera-retro" style="font-size: 3rem; color: var(--primary-color); margin-bottom: 20px;"></i>
            <h2>나의 동물 상 찾기</h2>
            <p style="color: var(--text-muted); margin-bottom: 30px;">
                'Start' 버튼을 누르고 카메라 허용을 해주세요.<br>
                실시간으로 개, 고양이, 너구리 중 어떤 상인지 분석합니다.
            </p>
            
            <button type="button" class="start-btn" onclick="init()">AI 분석 시작</button>
            
            <div id="webcam-container"></div>
            <div id="label-container"></div>
        </div>

        <!-- Comments Section -->
        <section style="margin-top: 60px; padding-bottom: 40px;">
            <div id="disqus_thread" style="background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);"></div>
            <script>
                var disqus_config = function () {
                    this.page.url = window.location.href;  
                    this.page.identifier = 'mediinfo-animal'; 
                };
                (function() { 
                    var d = document, s = d.createElement('script');
                    s.src = 'https://jh8571.disqus.com/embed.js';
                    s.setAttribute('data-timestamp', +new Date());
                    (d.head || d.body).appendChild(s);
                })();
            </script>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 MediInfo. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script type="text/javascript">
        const URL = "https://teachablemachine.withgoogle.com/models/31Ab0XZ7s/";
        let model, webcam, labelContainer, maxPredictions;

        async function init() {
            const startBtn = document.querySelector('.start-btn');
            startBtn.style.display = 'none';

            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            const flip = true;
            webcam = new tmImage.Webcam(200, 200, flip);
            await webcam.setup();
            await webcam.play();
            window.requestAnimationFrame(loop);

            document.getElementById("webcam-container").appendChild(webcam.canvas);
            labelContainer = document.getElementById("label-container");
            for (let i = 0; i < maxPredictions; i++) {
                const div = document.createElement("div");
                div.className = "prediction-bar";
                labelContainer.appendChild(div);
            }
        }

        async function loop() {
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            for (let i = 0; i < maxPredictions; i++) {
                const prob = (prediction[i].probability * 100).toFixed(0);
                labelContainer.childNodes[i].innerHTML = `
                    <span class="label-text">${prediction[i].className}</span>
                    <div class="bar-bg"><div class="bar-fill" style="width: ${prob}%"></div></div>
                    <span class="percent-text">${prob}%</span>
                `;
            }
        }
    </script>
</body>
</html>
