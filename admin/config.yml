                  - name: "traits"
                    label: "특징 목록"
                    widget: "list"
                    field: { label: "특징", name: "trait", widget: "string" }
                  - name: "strengths"
                    label: "강점 목록"
                    widget: "list"
                    field: { label: "강점", name: "strength", widget: "string" }
                  - name: "weaknesses"
                    label: "약점 목록"
