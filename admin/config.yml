logo_url: https://newj8571.pages.dev/favicon.svg

media_folder: "e1"
public_folder: "/e1"

# ────────────────────────────────────────────────────────────────
collections:

  # ① 사이트 설정
  - name: "settings"
    label: "사이트 설정"
    files:
      - name: "site_config"
        label: "내비게이션 & 기본 정보"
        file: "site_config.json"
        format: json
        fields:
          - name: "site"
            label: "사이트 기본 정보"
            widget: "object"
            fields:
              - { name: "title",       label: "사이트 제목",    widget: "string" }
              - { name: "logo_text",   label: "로고 텍스트",    widget: "string" }
              - { name: "tagline",     label: "슬로건",         widget: "string" }
              - { name: "description", label: "사이트 설명",    widget: "text" }
              - name: "accent_color"
                label: "포인트 컬러"
                widget: "select"
                options:
                  - { label: "인디고 (기본)", value: "#6366f1" }
                  - { label: "보라", value: "#8b5cf6" }
                  - { label: "핑크", value: "#ec4899" }
                  - { label: "에메랄드", value: "#10b981" }
                  - { label: "스카이블루", value: "#0ea5e9" }
                  - { label: "오렌지", value: "#f59e0b" }
                  - { label: "로즈", value: "#f43f5e" }
                default: "#6366f1"
          - name: "nav"
            label: "내비게이션 메뉴"
            widget: "list"
            fields:
              - { name: "id",       label: "메뉴 ID",        widget: "string" }
              - { name: "label_ko", label: "메뉴명 (한국어)", widget: "string" }
              - { name: "label_en", label: "메뉴명 (영어)",   widget: "string" }
              - { name: "href",     label: "링크 (파일명)",   widget: "string" }
              - name: "enabled"
                label: "표시 여부"
                widget: "boolean"
                default: true
          - name: "footer"
            label: "푸터 설정"
            widget: "object"
            fields:
              - { name: "copyright",    label: "저작권 (한국어)", widget: "string" }
              - { name: "copyright_en", label: "저작권 (영어)",   widget: "string" }

  # ② 운동 가이드
  - name: "exercise"
    label: "운동 가이드"
    files:
      - name: "exercise_data"
        label: "운동 목록 & 프로그램"
        file: "exercise_data.json"
        format: json
        fields:
          - name: "exercises"
            label: "운동 목록"
            widget: "list"
            fields:
              - { name: "id",           label: "ID",          widget: "string" }
              - { name: "name",         label: "운동명",       widget: "string" }
              - { name: "category",     label: "카테고리",     widget: "string" }
              - { name: "target",       label: "타겟 부위",    widget: "string" }
              - name: "difficulty"
                label: "난이도"
                widget: "select"
                options: ["초급", "중급", "고급"]
              - name: "steps"
                label: "수행 단계"
                widget: "list"
                field: { label: "단계 설명", name: "step", widget: "string" }
              - { name: "posture_tips", label: "자세 포인트",  widget: "text" }
              - name: "image"
                label: "이미지 URL"
                widget: "string"
                hint: "Wikimedia Commons URL 또는 /e1/파일명.png"
          - name: "programs"
            label: "운동 프로그램"
            widget: "list"
            fields:
              - { name: "id",    label: "프로그램 ID",  widget: "string" }
              - { name: "title", label: "프로그램명",    widget: "string" }
              - { name: "desc",  label: "프로그램 설명", widget: "text" }
              - name: "exerciseIds"
                label: "포함 운동 ID 목록"
                widget: "list"
                field: { label: "운동 ID", name: "exerciseId", widget: "string" }
              - { name: "diet_tip", label: "식단 팁", widget: "text" }
          - name: "bmi_guide"
            label: "BMI 가이드"
            widget: "object"
            fields:
              - name: "underweight"
                label: "저체중"
                widget: "object"
                fields:
                  - { name: "label", label: "라벨", widget: "string" }
                  - { name: "desc",  label: "설명", widget: "text" }
                  - { name: "programId", label: "연결 프로그램 ID", widget: "string" }
              - name: "normal"
                label: "정상"
                widget: "object"
                fields:
                  - { name: "label", label: "라벨", widget: "string" }
                  - { name: "desc",  label: "설명", widget: "text" }
                  - { name: "programId", label: "연결 프로그램 ID", widget: "string" }
              - name: "overweight"
                label: "과체중"
                widget: "object"
                fields:
                  - { name: "label", label: "라벨", widget: "string" }
                  - { name: "desc",  label: "설명", widget: "text" }
                  - { name: "programId", label: "연결 프로그램 ID", widget: "string" }
              - name: "obesity"
                label: "비만"
                widget: "object"
                fields:
                  - { name: "label", label: "라벨", widget: "string" }
                  - { name: "desc",  label: "설명", widget: "text" }
                  - { name: "programId", label: "연결 프로그램 ID", widget: "string" }

  # ③ MBTI
  - name: "mbti"
    label: "MBTI 테스트"
    files:
      - name: "mbti_questions"
        label: "MBTI 질문 (60문항)"
        file: "mbti_data.json"
        format: json
        fields:
          - name: "questions"
            label: "질문 목록"
            widget: "list"
            fields:
              - { name: "id",   label: "번호",      widget: "number" }
              - { name: "q",    label: "질문 내용",  widget: "string" }
              - name: "type"
                label: "차원"
                widget: "select"
                options: ["EI", "SN", "TF", "JP"]
              - name: "pole"
                label: "높은 점수가 가리키는 방향"
                widget: "select"
                options: ["E", "I", "S", "N", "T", "F", "J", "P"]
          - name: "types"
            label: "16가지 유형 데이터"
            widget: "object"
            fields:
              - name: "ISTJ"
                label: "ISTJ - 논리주의자"
                widget: "object"
                fields:
                  - { name: "emoji",            label: "이모지",                   widget: "string" }
                  - { name: "title",            label: "유형 제목",                widget: "string" }
                  - { name: "tagline",          label: "태그라인",                 widget: "string" }
