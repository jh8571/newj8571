  # ④ 오늘의 운세
  - name: "fortune"
    label: "오늘의 운세"
    files:
      - name: "fortune_data"
        label: "타로 카드 & 사주"
        file: "fortune_data.json"
        format: json
        fields:
          - name: "tarot"
            label: "타로 카드"
            widget: "object"
            fields:
              - name: "cards"
                label: "카드 목록 (22장)"
                widget: "list"
                fields:
                  - { name: "id",       label: "카드 번호",    widget: "number" }
                  - { name: "name",     label: "카드 이름",    widget: "string" }
                  - { name: "image",    label: "카드 이미지 URL", widget: "string" }
                  - { name: "meaning",  label: "카드 해석",    widget: "text" }
                  - { name: "keywords", label: "키워드 (·로 구분)", widget: "string" }
          - name: "saju"
            label: "사주 설정"
            widget: "object"
            fields:
              - name: "descriptions"
                label: "사주 설명"
                widget: "object"
                fields:
                  - name: "professional_analysis"
                    label: "기본 분석 텍스트"
                    widget: "text"

  # ⑤ 심리 분석 테스트
  - name: "psychology"
    label: "심리 분석"
    files:
      - name: "tests"
        label: "심리 테스트 목록"
        file: "tests.json"
        format: json
        fields:
          - name: "root"
            label: "테스트 배열"
            widget: "list"
            fields:
              - { name: "id",          label: "테스트 ID",   widget: "number" }
              - { name: "title",       label: "테스트 제목", widget: "string" }
              - { name: "description", label: "설명",        widget: "text" }
              - name: "questions"
                label: "질문 목록"
                widget: "list"
                fields:
                  - { name: "q", label: "질문 내용", widget: "string" }
                  - name: "options"
                    label: "선택지"
                    widget: "list"
                    fields:
                      - { name: "text",  label: "선택지 텍스트", widget: "string" }
                      - { name: "score", label: "점수",          widget: "number" }
              - name: "results"
                label: "점수 구간별 결과"
                widget: "list"
                fields:
                  - { name: "range", label: "점수 범위 (예: 0-4)", widget: "string" }
                  - { name: "text",  label: "결과 설명",           widget: "text" }

  # ⑥ 미디어 (이미지)
  - name: "media"
    label: "운동 이미지 관리"
    folder: "e1"
    create: true
    label_singular: "이미지"
    fields:
      - name: "image"
        label: "이미지 업로드"
        widget: "image"
      - { name: "title", label: "이미지 설명", widget: "string", required: false }

  # ⑦ 영양소 & 의약품
  - name: "data"
    label: "AI 영양 데이터"
    files:
      - name: "nutrients"
        label: "영양소 데이터"
        file: "nutrients.json"
        format: json
        fields:
          - name: "nutrients"
            label: "영양소 목록"
            widget: "list"
            fields:
              - { name: "id",          label: "ID",          widget: "string" }
              - { name: "name",        label: "이름",        widget: "string" }
              - { name: "category",    label: "카테고리",    widget: "string" }
              - { name: "efficacy",    label: "효능",        widget: "text" }
              - { name: "description", label: "상세 설명",   widget: "text" }
              - { name: "dri",         label: "권장 섭취량", widget: "string" }
              - { name: "food",        label: "함유 식품",   widget: "string" }
              - { name: "caution",     label: "주의 사항",   widget: "text" }
      - name: "drugs"
        label: "의약품 데이터"
        file: "drugs.json"
        format: json
        fields:
          - name: "drugs"
            label: "의약품 목록"
            widget: "list"
            fields:
              - { name: "id",            label: "ID",          widget: "number" }
              - { name: "name",          label: "이름",        widget: "string" }
              - { name: "manufacturer",  label: "제조사",      widget: "string" }
              - { name: "category",      label: "분류",        widget: "string" }
              - { name: "ingredients",   label: "성분",        widget: "text" }
              - { name: "efficacy",      label: "효능",        widget: "text" }
              - { name: "usage",         label: "용법/용량",   widget: "text" }
              - { name: "insuranceCode", label: "보험코드",    widget: "string", required: false }
              - { name: "storage",       label: "보관 방법",   widget: "string", required: false }
              - { name: "description",   label: "상세 설명",   widget: "text",   required: false }
