<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>VitalRest 관리자 센터</title>
  
  <!-- 설정 파일(config.yml)의 위치를 명시적으로 지정 -->
  <link rel="cms-config-url" type="text/yaml" href="config.yml" />

  <!-- Sveltia CMS 로드 -->
  <script src="https://unpkg.com/sveltia-cms/dist/sveltia-cms.js" type="module"></script>
</head>
<body>
  <div id="nc-root">
    <div style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color: #444; background: #f4f4f4;">
      <div style="text-align: center;">
        <div style="border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; margin: 0 auto 20px;"></div>
        <p style="font-size: 1.1rem; font-weight: 500;">관리 시스템을 초기화 중입니다...</p>
        <p style="font-size: 0.9rem; color: #888; margin-top: 10px;">잠시만 기다려 주세요 (10초 이상 소요될 수 있습니다)</p>
      </div>
    </div>
  </div>
  <style>
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</body>
</html>
