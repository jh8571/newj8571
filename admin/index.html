<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VitalRest Admin Center</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }
    #cms-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
      padding: 40px;
    }
    .loading-logo {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
    }
    .loading-title {
      font-size: 1.1rem;
      color: #94a3b8;
      margin-top: -16px;
    }
    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #1e293b;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      color: #64748b;
      font-size: 0.9rem;
    }
    #error-box {
      display: none;
      background: #1e293b;
      border: 1px solid #ef4444;
      border-radius: 14px;
      padding: 24px 32px;
      max-width: 520px;
      width: 100%;
    }
    #error-box h3 { color: #ef4444; margin-bottom: 12px; font-size: 1rem; display: flex; align-items: center; gap: 8px; }
    #error-box .err-list { color: #94a3b8; font-size: 0.82rem; line-height: 2; list-style: none; }
    #error-box .err-list li::before { content: "• "; color: #6366f1; }
    #error-box .reload-btn {
      margin-top: 16px;
      display: block;
      width: 100%;
      padding: 10px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
    }
    #error-detail {
      margin-top: 10px;
      font-size: 0.75rem;
      color: #475569;
      word-break: break-all;
      max-height: 80px;
      overflow-y: auto;
    }
    .loading-features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      max-width: 640px;
      width: 100%;
    }
    .feature-chip {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.82rem;
      color: #94a3b8;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .feature-chip span { font-size: 1.1rem; }
  </style>
</head>
<body>

  <div id="cms-loading">
    <div class="loading-logo">VitalRest</div>
    <div class="loading-title">관리자 센터 초기화 중...</div>
    <div class="loading-spinner" id="spinner"></div>
    <div class="loading-text" id="loading-status">Sveltia CMS 로딩 중...</div>

    <div id="error-box">
      <h3>⚠️ CMS 로드 실패</h3>
      <ul class="err-list">
        <li id="err-script">CMS 스크립트 로드 중 오류 발생</li>
        <li>브라우저 F12 → Console 탭에서 상세 오류 확인 가능</li>
        <li>네트워크 연결 또는 광고 차단기를 확인해 주세요</li>
      </ul>
      <div id="error-detail"></div>
      <button class="reload-btn" onclick="location.reload()">페이지 새로고침</button>
    </div>

    <div class="loading-features" id="feature-list">
      <div class="feature-chip"><span>⚙️</span> 사이트 설정</div>
      <div class="feature-chip"><span>💪</span> 운동 가이드</div>
      <div class="feature-chip"><span>🧠</span> MBTI 테스트</div>
      <div class="feature-chip"><span>🔮</span> 오늘의 운세</div>
      <div class="feature-chip"><span>🧘</span> 심리 분석</div>
      <div class="feature-chip"><span>💊</span> AI 영양 데이터</div>
      <div class="feature-chip"><span>🖼️</span> 이미지 관리</div>
    </div>
  </div>

  <noscript>자바스크립트를 활성화해야 관리자 페이지를 이용할 수 있습니다.</noscript>

  <script>
    function showError(detail) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('loading-status').style.display = 'none';
      document.getElementById('feature-list').style.display = 'none';
      const errBox = document.getElementById('error-box');
      errBox.style.display = 'block';
      if (detail) {
        document.getElementById('error-detail').textContent = detail;
      }
      console.error('[VitalRest Admin] CMS load error:', detail);
    }

    // 1. Verify config.yml is accessible before loading CMS
    fetch('./config.yml')
      .then(r => {
        if (!r.ok) throw new Error('config.yml HTTP ' + r.status);
        document.getElementById('loading-status').textContent = 'config.yml 확인 완료 — CMS 로딩 중...';
        return r.text();
      })
      .then(() => {
        // 2. Dynamically load Sveltia CMS after config is confirmed reachable
        const script = document.createElement('script');
        script.type = 'module';
        script.src = 'https://unpkg.com/sveltia-cms@0.153.0/dist/sveltia-cms.js';
        script.onerror = (e) => showError('unpkg CDN 로드 실패 — 네트워크 연결을 확인하세요.');
        document.head.appendChild(script);

        // 3. Watch for CMS mounting
        const observer = new MutationObserver(() => {
          const root = document.querySelector('sveltia-cms, #nc-root, .nc-app-container, [data-sveltia-cms]');
          if (root) {
            document.getElementById('cms-loading').style.display = 'none';
            observer.disconnect();
          }
        });
        observer.observe(document.body, { childList: true, subtree: true });

        // 4. Timeout fallback — if CMS hasn't appeared after 15s
        setTimeout(() => {
          const root = document.querySelector('sveltia-cms, #nc-root, .nc-app-container, [data-sveltia-cms]');
          if (!root) showError('15초 후에도 CMS가 마운트되지 않았습니다.');
        }, 15000);
      })
      .catch(err => showError('config.yml 접근 실패: ' + err.message));
  </script>

</body>
</html>
