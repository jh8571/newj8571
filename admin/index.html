<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VitalRest 관리자 센터</title>
  <!-- 설정 파일 경로 명시 -->
  <link rel="cms-config-url" type="text/yaml" href="/admin/config.yml" />
</head>
<body>
  <div id="status" style="padding: 20px; font-family: sans-serif; text-align: center; color: #555;">
    <p>🚀 관리 시스템을 불러오는 중...</p>
    <p id="error-log" style="color: red; font-size: 14px; margin-top: 10px;"></p>
  </div>

  <script type="module">
    // 에러 발생 시 화면에 표시
    window.addEventListener('error', (event) => {
      document.getElementById('error-log').innerText = "에러 발생: " + event.message;
      console.error(event);
    });

    // Sveltia CMS 로드 (다른 CDN 사용)
    import 'https://cdn.jsdelivr.net/npm/sveltia-cms@0.43.0/dist/sveltia-cms.js';
    
    // 로딩 성공 시 메시지 숨김 (CMS가 화면을 덮음)
    setTimeout(() => {
      const status = document.getElementById('status');
      if (status && !document.querySelector('.sveltia-cms')) {
         // 아직 CMS 화면이 안 떴다면 안내 메시지 추가
         status.innerHTML += "<p style='font-size:12px; color:#888;'>로그인 버튼이 나타나지 않으면 페이지를 새로고침(F5) 해주세요.</p>";
      }
    }, 5000);
  </script>
</body>
</html>
