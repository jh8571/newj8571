        .rf-wrap { max-width: 880px; margin: 0 auto; }

        .sel-none { font-size: 0.85rem; color: var(--text-muted); }

        .find-btn {
            width: 100%; padding: 18px; background: var(--primary-color); color: white;

        .recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }

            background: var(--card-bg); border: 1px solid var(--border-color);

            text-decoration: none; color: var(--text-main); display: block;

        .recipe-card:hover { transform: translateY(-4px); box-shadow: 0 16px 48px rgba(0,0,0,0.1); }
        .recipe-img { width: 100%; height: 180px; object-fit: cover; display: block; background: var(--border-color); }
        .recipe-body { padding: 16px 18px; }
        .recipe-title { font-size: 0.92rem; font-weight: 800; line-height: 1.4; margin-bottom: 10px; }
        .recipe-stats { display: flex; gap: 10px; flex-wrap: wrap; }
        .rst { font-size: 0.77rem; font-weight: 700; padding: 3px 10px; border-radius: 99px; }
        .rst-used { background: rgba(16,185,129,0.12); color: #059669; }
        .rst-miss { background: rgba(239,68,68,0.1); color: #dc2626; }
        .recipe-view {
            display: block; margin: 10px 18px 16px; padding: 9px;

        .rf-status { text-align: center; padding: 70px 0; color: var(--text-muted); }

    <script src="theme.js"></script>
    <script>
    const SPOON_KEY = 'aaf5a24046374105b773c86c9287592d';

    const INGREDIENT_GROUPS = {
        protein: [
            { ko: '🍗 닭가슴살', en: '🍗 Chicken Breast', api: 'chicken breast' },
            { ko: '🥩 소고기',   en: '🥩 Beef',           api: 'beef' },
            { ko: '🐷 돼지고기', en: '🐷 Pork',           api: 'pork' },
            { ko: '🐟 연어',     en: '🐟 Salmon',         api: 'salmon' },
            { ko: '🦐 새우',     en: '🦐 Shrimp',         api: 'shrimp' },
            { ko: '🥚 달걀',     en: '🥚 Egg',            api: 'egg' },
            { ko: '🫘 두부',     en: '🫘 Tofu',           api: 'tofu' },
            { ko: '🫙 그릭요거트', en: '🫙 Greek Yogurt', api: 'greek yogurt' },
            { ko: '🥛 우유',     en: '🥛 Milk',           api: 'milk' },
            { ko: '🐟 참치캔',   en: '🐟 Canned Tuna',    api: 'tuna' },
        ],
        veggie: [
            { ko: '🥦 브로콜리', en: '🥦 Broccoli',       api: 'broccoli' },
            { ko: '🌿 시금치',   en: '🌿 Spinach',        api: 'spinach' },
            { ko: '🧅 양파',     en: '🧅 Onion',          api: 'onion' },
            { ko: '🧄 마늘',     en: '🧄 Garlic',         api: 'garlic' },
            { ko: '🍅 토마토',   en: '🍅 Tomato',         api: 'tomato' },
            { ko: '🫑 파프리카', en: '🫑 Bell Pepper',    api: 'bell pepper' },
            { ko: '🥕 당근',     en: '🥕 Carrot',         api: 'carrot' },
            { ko: '🥒 오이',     en: '🥒 Cucumber',       api: 'cucumber' },
            { ko: '🍄 버섯',     en: '🍄 Mushroom',       api: 'mushroom' },
            { ko: '🥑 아보카도', en: '🥑 Avocado',        api: 'avocado' },
            { ko: '🫛 완두콩',   en: '🫛 Peas',           api: 'peas' },
            { ko: '🫚 올리브오일', en: '🫚 Olive Oil',    api: 'olive oil' },
        ],
        carb: [
            { ko: '🍚 현미',     en: '🍚 Brown Rice',     api: 'brown rice' },
            { ko: '🍝 파스타',   en: '🍝 Pasta',          api: 'pasta' },
            { ko: '🥔 감자',     en: '🥔 Potato',         api: 'potato' },
            { ko: '🍠 고구마',   en: '🍠 Sweet Potato',   api: 'sweet potato' },
            { ko: '🌾 오트밀',   en: '🌾 Oats',           api: 'oats' },
            { ko: '🫙 통조림콩', en: '🫙 Canned Beans',   api: 'canned beans' },
            { ko: '🍋 레몬',     en: '🍋 Lemon',          api: 'lemon' },
            { ko: '🧈 버터',     en: '🧈 Butter',         api: 'butter' },
        ],
    };

    // en → { ko, en, api }
    const selected = new Map();

    function renderGroups() {
        const lang = localStorage.getItem('lang') || 'ko';
        ['protein', 'veggie', 'carb'].forEach(g => {
            const el = document.getElementById(`grid-${g}`);
            el.innerHTML = INGREDIENT_GROUPS[g].map(ing => {
                const label = lang === 'ko' ? ing.ko : ing.en;
                const id = 'chip-' + ing.api.replace(/\s/g, '_');
                return `<div class="ing-chip" id="${id}" onclick="toggle('${ing.api}')">${label}</div>`;
            }).join('');
        });
        // re-apply selected state
        selected.forEach((_, api) => {
            document.getElementById('chip-' + api.replace(/\s/g, '_'))?.classList.add('selected');
        });
    }

    function toggle(api) {
        // find ingredient data
        let ing = null;
        for (const group of Object.values(INGREDIENT_GROUPS)) {
            ing = group.find(i => i.api === api);
            if (ing) break;
        }
        if (!ing) return;

        if (selected.has(api)) {
            selected.delete(api);
            document.getElementById('chip-' + api.replace(/\s/g, '_'))?.classList.remove('selected');
        } else {
            selected.set(api, ing);
            document.getElementById('chip-' + api.replace(/\s/g, '_'))?.classList.add('selected');
        }
        updateSelBar();
    }

    function updateSelBar() {
        const t = window.t;
        const lang = localStorage.getItem('lang') || 'ko';
        const el = document.getElementById('sel-tags');
        const btn = document.getElementById('find-btn');

        if (selected.size === 0) {
            el.innerHTML = `<span class="sel-none">${t('재료를 선택해주세요', 'Please select ingredients')}</span>`;
            btn.disabled = true;
        } else {
            el.innerHTML = [...selected.entries()].map(([api, ing]) => {
                const label = lang === 'ko' ? ing.ko : ing.en;
                return `<span class="sel-tag">${label} <button onclick="toggle('${api}')">✕</button></span>`;
            }).join('');
            btn.disabled = false;
        }
    }

    async function findRecipes() {
        const t = window.t;
        if (selected.size === 0) return;
        const ingredients = [...selected.keys()].join(',');
        const el = document.getElementById('recipe-results');
        el.innerHTML = `<div class="rf-status"><div class="icon">⏳</div><p>${t('레시피 검색 중...', 'Searching for recipes...')}</p></div>`;

        try {
            const url = `https://api.spoonacular.com/recipes/findByIngredients?ingredients=${encodeURIComponent(ingredients)}&number=12&ranking=2&ignorePantry=true&apiKey=${SPOON_KEY}`;
            const res = await fetch(url);
            if (!res.ok) {
                if (res.status === 402) throw new Error('quota');
                throw new Error(res.status);
            }
            const data = await res.json();

            if (!data || data.length === 0) {
                el.innerHTML = `<div class="rf-status"><div class="icon">😅</div><p>${t('선택한 재료로 찾을 수 있는 레시피가 없습니다.<br>재료를 더 추가해보세요.', 'No recipes found with the selected ingredients.<br>Try adding more ingredients.')}</p></div>`;
                return;
            }
            renderRecipes(data);
        } catch (e) {
            const msg = e.message === 'quota'
                ? t('오늘의 API 요청 한도에 도달했습니다. 내일 다시 시도해주세요.', 'Daily API quota reached. Please try again tomorrow.')
                : t('오류가 발생했습니다. 잠시 후 다시 시도해주세요.', 'An error occurred. Please try again later.');
            el.innerHTML = `<div class="rf-status"><div class="icon">⚠️</div><p>${msg}</p></div>`;
        }
    }

    function renderRecipes(recipes) {
        const t = window.t;
        const el = document.getElementById('recipe-results');
        const slug = title => title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
        const viewLabel  = t('전체 레시피 보기 →', 'View Full Recipe →');
        const usedLabel  = (n) => t(`✓ 보유재료 ${n}개`, `✓ ${n} used`);
        const missLabel  = (n) => t(`+ 필요재료 ${n}개`, `+ ${n} missing`);
        const perfectLabel = t('완벽 매칭 🎉', 'Perfect Match 🎉');

        const cards = recipes.map(r => {
            const url = `https://spoonacular.com/recipes/${slug(r.title)}-${r.id}`;
            return `
            <a class="recipe-card" href="${url}" target="_blank" rel="noopener">
                <img class="recipe-img" src="${r.image}" alt="${r.title}" loading="lazy" onerror="this.style.display='none'">
                <div class="recipe-body">
                    <div class="recipe-title">${r.title}</div>
                    <div class="recipe-stats">
                        <span class="rst rst-used">${usedLabel(r.usedIngredientCount)}</span>
                        ${r.missedIngredientCount > 0
                            ? `<span class="rst rst-miss">${missLabel(r.missedIngredientCount)}</span>`
                            : `<span class="rst rst-used">${perfectLabel}</span>`}
                    </div>
                </div>
                <span class="recipe-view">${viewLabel}</span>
            </a>`;
        }).join('');

        el.innerHTML = `<div class="recipe-grid">${cards}</div>`;
    }

    // Initialize
    renderGroups();
    updateSelBar();
    </script>
    <script src="cookie-consent.js"></script>
</body>
