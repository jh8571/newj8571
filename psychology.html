<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>심리테스트 센터 - MediInfo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .test-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            padding: 40px 0;
        }
        .test-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: all 0.3s;
            cursor: pointer;
            border: 1px solid #e2e8f0;
        }
        .test-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .question-block {
            background: #f8fafc;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .option-btn {
            display: block;
            width: 100%;
            padding: 12px 20px;
            margin: 8px 0;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
            font-size: 1rem;
        }
        .option-btn:hover {
            background: #f1f5f9;
            border-color: #004e92;
        }
        .option-btn.selected {
            background: #004e92;
            color: white;
            border-color: #004e92;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>MediInfo 심리테스트</h1>
            <p>나도 몰랐던 내 안의 나를 발견하는 시간</p>
            <nav>
                <a href="index.html">의약품 검색</a>
                <a href="psychology.html" class="active">심리테스트</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="search-container" style="margin-top: -30px;">
            <input type="text" id="test-search-input" placeholder="관심 있는 테스트 주제를 검색하세요...">
            <button><i class="fas fa-search"></i></button>
        </div>

        <div id="test-list" class="test-grid">
            <!-- Test cards will be injected here -->
        </div>
    </main>

    <!-- Test Modal -->
    <div id="test-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="test-modal-body">
                <!-- Test content will be injected here -->
            </div>
        </div>
    </div>

    <footer>
        <div class="container">
            <p>&copy; 2026 MediInfo. All rights reserved.</p>
        </div>
    </footer>

    <script src="psychology.js"></script>
</body>
</html>
