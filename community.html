    <style>
        .comm-wrap { max-width: 760px; margin: 0 auto; padding-bottom: 80px; }

        /* 탭 */
        .comm-tabs { display: flex; gap: 4px; background: var(--bg-color); border-radius: 16px; padding: 5px; margin-bottom: 28px; }
        .comm-tab { flex: 1; padding: 11px; border: none; background: transparent; border-radius: 12px; font-size: 0.95rem; font-weight: 800; cursor: pointer; color: var(--text-muted); transition: .2s; }
        .comm-tab.active { background: var(--card-bg); color: var(--primary-color); box-shadow: 0 2px 8px rgba(0,0,0,.08); }

        /* 알림 배지 */
        .notif-badge { display: inline-block; background: #ef4444; color: white; border-radius: 99px; font-size: 0.7rem; font-weight: 900; padding: 1px 6px; margin-left: 5px; vertical-align: middle; }

        /* 글쓰기 폼 */
        .write-box { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 20px; padding: 20px; margin-bottom: 24px; }
        .write-box textarea { width: 100%; min-height: 90px; padding: 13px 16px; background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 12px; font-size: 0.92rem; color: var(--text-main); resize: vertical; outline: none; box-sizing: border-box; line-height: 1.6; font-family: inherit; }
        .write-box textarea:focus { border-color: var(--primary-color); }
        .write-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; flex-wrap: wrap; gap: 10px; }
        .write-options { display: flex; align-items: center; gap: 14px; }
        .write-submit { padding: 10px 22px; background: var(--primary-color); color: white; border: none; border-radius: 12px; font-size: 0.88rem; font-weight: 800; cursor: pointer; transition: opacity .2s; }
        .write-submit:hover { opacity: .85; }
        .write-submit:disabled { opacity: .5; cursor: not-allowed; }
        .check-label { display: flex; align-items: center; gap: 6px; font-size: 0.82rem; font-weight: 700; color: var(--text-muted); cursor: pointer; }

        /* 글 카드 */
        .post-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 18px; padding: 18px 20px; margin-bottom: 14px; transition: .2s; }
        .post-card:hover { border-color: color-mix(in srgb, var(--primary-color) 30%, transparent); }
        .post-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .post-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; background: var(--border-color); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; overflow: hidden; }
        .post-meta { flex: 1; min-width: 0; }
        .post-name { font-size: 0.88rem; font-weight: 800; color: var(--text-main); }
        .post-date { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }
        .post-body { font-size: 0.92rem; line-height: 1.8; color: var(--text-main); margin-bottom: 12px; word-break: keep-all; white-space: pre-wrap; }
        .secret-body { font-size: 0.88rem; color: var(--text-muted); font-style: italic; }
        .post-foot { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .post-btn { background: none; border: 1px solid var(--border-color); border-radius: 20px; padding: 4px 12px; font-size: 0.78rem; font-weight: 700; cursor: pointer; color: var(--text-muted); transition: .15s; display: flex; align-items: center; gap: 5px; }
        .post-btn:hover { border-color: var(--primary-color); color: var(--primary-color); }
        .post-btn.liked { background: color-mix(in srgb, #ef4444 10%, transparent); border-color: #ef4444; color: #ef4444; }
        .post-btn.delete-btn:hover { border-color: #ef4444; color: #ef4444; }
        .private-badge { font-size: 0.72rem; background: #fef3c7; color: #92400e; padding: 2px 8px; border-radius: 99px; font-weight: 700; }
        .admin-badge { font-size: 0.72rem; background: color-mix(in srgb, var(--primary-color) 15%, transparent); color: var(--primary-color); padding: 2px 8px; border-radius: 99px; font-weight: 700; }

        /* QnA 답변 */
        .answer-section { margin-top: 14px; border-top: 1px solid var(--border-color); padding-top: 14px; }
        .answer-card { background: var(--bg-color); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; border-left: 3px solid var(--accent-color); }
        .answer-card:last-child { margin-bottom: 0; }
        .answer-write { display: flex; gap: 10px; margin-top: 12px; }
        .answer-write input { flex: 1; padding: 10px 14px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; font-size: 0.88rem; color: var(--text-main); outline: none; }
        .answer-write input:focus { border-color: var(--primary-color); }
        .answer-write button { padding: 10px 16px; background: var(--accent-color); color: white; border: none; border-radius: 12px; font-size: 0.82rem; font-weight: 800; cursor: pointer; white-space: nowrap; }
        .toggle-answers { font-size: 0.8rem; font-weight: 700; color: var(--accent-color); cursor: pointer; background: none; border: none; padding: 0; }

        /* 알림 패널 */
        .notif-panel { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 18px; padding: 16px 18px; margin-bottom: 24px; }
        .notif-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border-color); font-size: 0.85rem; }
        .notif-item:last-child { border-bottom: none; }
        .notif-item.unread { background: color-mix(in srgb, var(--primary-color) 4%, transparent); border-radius: 10px; padding: 10px; margin: -0px; }
        .notif-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--primary-color); flex-shrink: 0; margin-top: 6px; }

        /* 더 보기 */
        .load-more-btn { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--border-color); border-radius: 14px; font-size: 0.88rem; font-weight: 700; color: var(--text-muted); cursor: pointer; transition: .2s; margin-top: 8px; }
        .load-more-btn:hover { border-color: var(--primary-color); color: var(--primary-color); }

        /* 로그인 유도 */
        .login-nudge { background: color-mix(in srgb, var(--primary-color) 6%, var(--card-bg)); border: 1px dashed color-mix(in srgb, var(--primary-color) 30%, transparent); border-radius: 16px; padding: 20px; text-align: center; margin-bottom: 24px; }
        .login-nudge p { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 12px; }
        .login-nudge button { padding: 10px 24px; background: var(--primary-color); color: white; border: none; border-radius: 12px; font-weight: 800; font-size: 0.88rem; cursor: pointer; }

        @media (max-width: 480px) {
            .write-box { padding: 14px; }
            .post-card { padding: 14px 16px; }
            .comm-tab { font-size: 0.85rem; padding: 10px 6px; }
        }
    </style>
</head>

    <script src="theme.js"></script>
    <script type="module">
    import { db, auth, getCurrentUser, getCurrentUserData, onUserChange, showAuthModal } from './firebase-auth.js';
    import {
        collection, doc, addDoc, getDoc, getDocs, updateDoc, deleteDoc,
        query, orderBy, limit, startAfter, onSnapshot, serverTimestamp,
        arrayUnion, arrayRemove, increment, where, setDoc
    } from 'https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js';

    const ADMIN_EMAIL = 'shokoku0701@gmail.com';
    const PAGE_SIZE   = 10;

    // ── 유틸 ──────────────────────────────────────────────────
    function esc(s) {
        return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }
    function timeAgo(ts) {
        if (!ts) return '';
        const sec = Math.floor((Date.now() - ts.toMillis()) / 1000);
        if (sec < 60) return '방금 전';
        if (sec < 3600) return Math.floor(sec/60) + '분 전';
        if (sec < 86400) return Math.floor(sec/3600) + '시간 전';
        return Math.floor(sec/86400) + '일 전';
    }
    function avatarHtml(photo, name, size=36) {
        if (photo) return `<img class="post-avatar" src="${esc(photo)}" style="width:${size}px;height:${size}px;" onerror="this.outerHTML='<div class=post-avatar style=width:${size}px;height:${size}px;>👤</div>'">`;
        return `<div class="post-avatar" style="width:${size}px;height:${size}px;">👤</div>`;
    }
    function getUser() { return getCurrentUser(); }
    function isAdmin(user) { return user?.email === ADMIN_EMAIL; }
    function canWrite(user) { return !!user; }

    // ── 현재 탭 ───────────────────────────────────────────────
    let curTab = 'guestbook';
    document.querySelectorAll('.comm-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            curTab = tab.dataset.tab;
            document.querySelectorAll('.comm-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById('panel-guestbook').style.display = curTab === 'guestbook' ? '' : 'none';
            document.getElementById('panel-qna').style.display = curTab === 'qna' ? '' : 'none';
            if (curTab === 'qna') { loadNotifications(); markNotifsRead(); }
        });
    });

    // ── 로그인 유도 UI ─────────────────────────────────────────
    function loginNudgeHtml(msg = '로그인 후 글을 작성할 수 있습니다.') {
        return `<div class="login-nudge">
            <p>${msg}</p>
            <button onclick="window.showAuthModal()">로그인 / 회원가입</button>
        </div>`;
    }

    // ══════════════════════════════════════════════════════════
    // 방명록
    // ══════════════════════════════════════════════════════════
    let gbLastDoc = null, gbLoading = false;

    function renderGbWriteArea(user) {
        const el = document.getElementById('gb-write-area');
        if (!user) { el.innerHTML = loginNudgeHtml(); return; }
        el.innerHTML = `
        <div class="write-box">
            <textarea id="gb-text" placeholder="방명록을 남겨보세요 😊" maxlength="500"></textarea>
            <div class="write-footer">
                <div class="write-options">
                    <label class="check-label">
                        <input type="checkbox" id="gb-private"> 🔒 비밀글
                    </label>
                    <span style="font-size:0.75rem;color:var(--text-muted);" id="gb-char">0/500</span>
                </div>
                <button class="write-submit" id="gb-submit">등록</button>
            </div>
        </div>`;
        document.getElementById('gb-text').addEventListener('input', e => {
            document.getElementById('gb-char').textContent = e.target.value.length + '/500';
        });
        document.getElementById('gb-submit').addEventListener('click', submitGb);
    }

    async function submitGb() {
        const user = getUser();
        if (!user) return;
        const msg = document.getElementById('gb-text').value.trim();
        if (!msg) return;
        const isPrivate = document.getElementById('gb-private').checked;
        const btn = document.getElementById('gb-submit');
        btn.disabled = true;
        try {
            await addDoc(collection(db, 'guestbook'), {
                uid: user.uid, name: user.displayName || '익명',
                photo: user.photoURL || '', message: msg,
                isPrivate, likes: 0, likedBy: [],
                reportCount: 0, createdAt: serverTimestamp()
            });
            document.getElementById('gb-text').value = '';
            document.getElementById('gb-char').textContent = '0/500';
            document.getElementById('gb-private').checked = false;
        } catch(e) { alert('등록 실패: ' + e.message); }
        btn.disabled = false;
    }

    function renderGbCard(docSnap, user) {
        const d = docSnap.data();
        const myPost = user && (user.uid === d.uid);
        const admin  = isAdmin(user);
        const canSee = !d.isPrivate || admin;
        const liked  = user && d.likedBy?.includes(user.uid);

        return `<div class="post-card" id="gb-${docSnap.id}">
            <div class="post-head">
                ${avatarHtml(d.photo, d.name)}
                <div class="post-meta">
                    <div class="post-name">${esc(d.name)} ${admin && myPost ? '<span class="admin-badge">관리자</span>' : ''}</div>
                    <div class="post-date">${timeAgo(d.createdAt)}</div>
                </div>
                ${d.isPrivate ? '<span class="private-badge">🔒 비밀</span>' : ''}
                ${d.reportCount >= 5 ? '<span class="private-badge" style="background:#fee2e2;color:#991b1b;">⚠️ 신고됨</span>' : ''}
            </div>
            <div class="post-body ${canSee ? '' : 'secret-body'}">
                ${canSee ? esc(d.message) : '🔒 비밀 글입니다.'}
            </div>
            <div class="post-foot">
                <button class="post-btn ${liked?'liked':''}" onclick="toggleLikeGb('${docSnap.id}')">
                    ❤️ ${d.likes||0}
                </button>
                ${user && !myPost ? `<button class="post-btn" onclick="reportPost('guestbook','${docSnap.id}')">🚨 신고</button>` : ''}
                ${myPost || admin ? `<button class="post-btn delete-btn" onclick="deleteGb('${docSnap.id}')">🗑 삭제</button>` : ''}
            </div>
        </div>`;
    }

    // onSnapshot 실시간 리스너 (최신 PAGE_SIZE개)
    let gbUnsubscribe = null;

    function startGbListener(user) {
        if (gbUnsubscribe) gbUnsubscribe();
        const q = query(collection(db,'guestbook'), orderBy('createdAt','desc'), limit(PAGE_SIZE));
        gbUnsubscribe = onSnapshot(q, snap => {
            const list = document.getElementById('gb-list');
            // 더 보기로 불러온 추가 글은 유지, 최신 PAGE_SIZE만 교체
            const extras = list.querySelectorAll('.extra-post');
            list.innerHTML = snap.docs.map(d => renderGbCard(d, user)).join('');
            extras.forEach(el => list.appendChild(el));
            gbLastDoc = snap.docs[snap.docs.length - 1];
            document.getElementById('gb-load-more').style.display =
                snap.docs.length === PAGE_SIZE ? '' : 'none';
        }, e => console.error('GB listener error:', e));
    }

    async function loadGb(reset=false) {
        if (gbLoading) return;
        gbLoading = true;
        const user = getUser();
        if (reset) {
            // reset 시에는 실시간 리스너 재시작
            startGbListener(user);
            gbLoading = false;
            return;
        }
        // 더 보기 (추가 데이터)
        if (!gbLastDoc) { gbLoading = false; return; }
        const q = query(collection(db,'guestbook'), orderBy('createdAt','desc'), startAfter(gbLastDoc), limit(PAGE_SIZE));
        try {
            const snap = await getDocs(q);
            const list = document.getElementById('gb-list');
            snap.docs.forEach(d => {
                const el = document.createElement('div');
                el.innerHTML = renderGbCard(d, user);
                el.firstChild.classList.add('extra-post');
                list.appendChild(el.firstChild);
            });
            gbLastDoc = snap.docs[snap.docs.length - 1];
            document.getElementById('gb-load-more').style.display =
                snap.docs.length === PAGE_SIZE ? '' : 'none';
        } catch(e) { console.error(e); }
        gbLoading = false;
    }

    window.toggleLikeGb = async function(id) {
        const user = getUser();
        if (!user) { window.showAuthModal(); return; }
        const ref = doc(db,'guestbook',id);
        const snap = await getDoc(ref);
        const liked = snap.data().likedBy?.includes(user.uid);
        await updateDoc(ref, {
            likes: increment(liked ? -1 : 1),
            likedBy: liked ? arrayRemove(user.uid) : arrayUnion(user.uid)
        });
    };

    window.deleteGb = async function(id) {
        if (!confirm('삭제하시겠습니까?')) return;
        await deleteDoc(doc(db,'guestbook',id));
    };

    document.getElementById('gb-load-more').addEventListener('click', () => loadGb(false));

    // ══════════════════════════════════════════════════════════
    // Q&A
    // ══════════════════════════════════════════════════════════
    let qnaLastDoc = null, qnaLoading = false;
    const openAnswers = new Set();

    function renderQnaWriteArea(user) {
        const el = document.getElementById('qna-write-area');
        if (!user) { el.innerHTML = loginNudgeHtml('로그인 후 질문을 등록할 수 있습니다.'); return; }
        el.innerHTML = `
        <div class="write-box">
            <textarea id="qna-text" placeholder="궁금한 점을 자유롭게 질문해 보세요 🙋" maxlength="800"></textarea>
            <div class="write-footer">
                <div class="write-options">
                    <label class="check-label"><input type="checkbox" id="qna-private"> 🔒 비밀글</label>
                    <span style="font-size:0.75rem;color:var(--text-muted);" id="qna-char">0/800</span>
                </div>
                <button class="write-submit" id="qna-submit">질문 등록</button>
            </div>
        </div>`;
        document.getElementById('qna-text').addEventListener('input', e => {
            document.getElementById('qna-char').textContent = e.target.value.length + '/800';
        });
        document.getElementById('qna-submit').addEventListener('click', submitQna);
    }

    async function submitQna() {
        const user = getUser();
        if (!user) return;
        const msg = document.getElementById('qna-text').value.trim();
        if (!msg) return;
        const isPrivate = document.getElementById('qna-private').checked;
        const btn = document.getElementById('qna-submit');
        btn.disabled = true;
        try {
            await addDoc(collection(db,'qna'), {
                uid: user.uid, name: user.displayName||'익명',
                photo: user.photoURL||'', question: msg,
                isPrivate, likes: 0, likedBy: [],
                answerCount: 0, reportCount: 0, createdAt: serverTimestamp()
            });
            document.getElementById('qna-text').value = '';
            document.getElementById('qna-char').textContent = '0/800';
            document.getElementById('qna-private').checked = false;
        } catch(e) { alert('등록 실패: ' + e.message); }
        btn.disabled = false;
    }

    function renderQnaCard(docSnap, user, answers=[]) {
        const d = docSnap.data();
        const myPost = user && (user.uid === d.uid);
        const admin  = isAdmin(user);
        const canSee = !d.isPrivate || admin;
        const liked  = user && d.likedBy?.includes(user.uid);
        const answOpen = openAnswers.has(docSnap.id);

        const answersHtml = answers.map(a => `
            <div class="answer-card">
                <div class="post-head" style="margin-bottom:8px;">
                    ${avatarHtml(a.photo, a.name, 28)}
                    <div class="post-meta">
                        <div class="post-name" style="font-size:0.82rem;">${esc(a.name)} ${isAdmin({email:a.email}) ? '<span class="admin-badge">관리자</span>' : ''}</div>
                        <div class="post-date">${timeAgo(a.createdAt)}</div>
                    </div>
                    ${(user && user.uid === a.uid) || admin ? `<button class="post-btn delete-btn" style="font-size:0.72rem;padding:3px 8px;" onclick="deleteAnswer('${docSnap.id}','${a.id}')">🗑</button>` : ''}
                </div>
                <div class="post-body" style="margin-bottom:0;font-size:0.88rem;">${esc(a.answer)}</div>
            </div>`).join('');

        const answerWriteHtml = user ? `
            <div class="answer-write">
                <input type="text" id="ans-${docSnap.id}" placeholder="답변을 입력하세요..." maxlength="500">
                <button onclick="submitAnswer('${docSnap.id}')">답변 등록</button>
            </div>` : `<p style="font-size:0.82rem;color:var(--text-muted);margin-top:10px;">로그인 후 답변할 수 있습니다.</p>`;

        return `<div class="post-card" id="qna-${docSnap.id}">
            <div class="post-head">
                ${avatarHtml(d.photo, d.name)}
                <div class="post-meta">
                    <div class="post-name">${esc(d.name)}</div>
                    <div class="post-date">${timeAgo(d.createdAt)}</div>
                </div>
                <div style="display:flex;gap:6px;align-items:center;">
                    ${d.isPrivate ? '<span class="private-badge">🔒 비밀</span>' : ''}
                    ${d.answerCount > 0 ? `<span style="background:#dcfce7;color:#166534;font-size:0.72rem;font-weight:700;padding:2px 8px;border-radius:99px;">✅ 답변 ${d.answerCount}개</span>` : ''}
                </div>
            </div>
            <div class="post-body ${canSee ? '' : 'secret-body'}">
                ${canSee ? esc(d.question) : '🔒 비밀 글입니다.'}
            </div>
            <div class="post-foot">
                <button class="post-btn ${liked?'liked':''}" onclick="toggleLikeQna('${docSnap.id}')">❤️ ${d.likes||0}</button>
                <button class="toggle-answers" onclick="toggleAnswers('${docSnap.id}')">
                    💬 ${d.answerCount||0}개 답변 ${answOpen ? '▲' : '▼'}
                </button>
                ${user && !myPost ? `<button class="post-btn" onclick="reportPost('qna','${docSnap.id}')">🚨 신고</button>` : ''}
                ${myPost || admin ? `<button class="post-btn delete-btn" onclick="deleteQna('${docSnap.id}')">🗑 삭제</button>` : ''}
            </div>
            ${answOpen ? `<div class="answer-section">${answersHtml}${answerWriteHtml}</div>` : ''}
        </div>`;
    }

    let qnaUnsubscribe = null;

    function startQnaListener(user) {
        if (qnaUnsubscribe) qnaUnsubscribe();
        const q = query(collection(db,'qna'), orderBy('createdAt','desc'), limit(PAGE_SIZE));
        qnaUnsubscribe = onSnapshot(q, async snap => {
            const list = document.getElementById('qna-list');
            const extras = list.querySelectorAll('.extra-post');
            const cards = await Promise.all(snap.docs.map(async d => {
                const answers = openAnswers.has(d.id) ? await loadAnswers(d.id) : [];
                return renderQnaCard(d, user, answers);
            }));
            list.innerHTML = cards.join('');
            extras.forEach(el => list.appendChild(el));
            qnaLastDoc = snap.docs[snap.docs.length - 1];
            document.getElementById('qna-load-more').style.display =
                snap.docs.length === PAGE_SIZE ? '' : 'none';
        }, e => console.error('QnA listener error:', e));
    }

    async function loadQna(reset=false) {
        if (qnaLoading) return;
        qnaLoading = true;
        const user = getUser();
        if (reset) {
            startQnaListener(user);
            qnaLoading = false;
            return;
        }
        if (!qnaLastDoc) { qnaLoading = false; return; }
        const q = query(collection(db,'qna'), orderBy('createdAt','desc'), startAfter(qnaLastDoc), limit(PAGE_SIZE));
        try {
            const snap = await getDocs(q);
            const list = document.getElementById('qna-list');
            for (const d of snap.docs) {
                const answers = openAnswers.has(d.id) ? await loadAnswers(d.id) : [];
                const el = document.createElement('div');
                el.innerHTML = renderQnaCard(d, user, answers);
                el.firstChild.classList.add('extra-post');
                list.appendChild(el.firstChild);
            }
            qnaLastDoc = snap.docs[snap.docs.length - 1];
            document.getElementById('qna-load-more').style.display =
                snap.docs.length === PAGE_SIZE ? '' : 'none';
        } catch(e) { console.error(e); }
        qnaLoading = false;
    }

    async function loadAnswers(qid) {
        const snap = await getDocs(query(collection(db,'qna',qid,'answers'), orderBy('createdAt','asc')));
        return snap.docs.map(d => ({ id: d.id, ...d.data() }));
    }

    window.toggleAnswers = async function(qid) {
        if (openAnswers.has(qid)) openAnswers.delete(qid);
        else openAnswers.add(qid);
        await loadQna(true);
        const el = document.getElementById('qna-' + qid);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    };

    window.submitAnswer = async function(qid) {
        const user = getUser();
        if (!user) { window.showAuthModal(); return; }
        const input = document.getElementById('ans-' + qid);
        const text = input?.value.trim();
        if (!text) return;
        input.disabled = true;
        try {
            await addDoc(collection(db,'qna',qid,'answers'), {
                uid: user.uid, name: user.displayName||'익명',
                photo: user.photoURL||'', email: user.email||'',
                answer: text, createdAt: serverTimestamp()
            });
            // 답변 수 업데이트
            await updateDoc(doc(db,'qna',qid), { answerCount: increment(1) });

            // 질문 작성자에게 알림
            const qSnap = await getDoc(doc(db,'qna',qid));
            const qData = qSnap.data();
            if (qData && qData.uid !== user.uid && !qData.uid.startsWith('kakao_')) {
                await sendNotification(qData.uid, {
                    type: 'answer',
                    fromName: user.displayName||'익명',
                    fromPhoto: user.photoURL||'',
                    questionId: qid,
                    questionText: qData.question.slice(0,40),
                });
            }
            openAnswers.add(qid);
            await loadQna(true);
        } catch(e) { alert('답변 등록 실패: ' + e.message); }
        if (input) input.disabled = false;
    };

    window.deleteAnswer = async function(qid, aid) {
        if (!confirm('삭제하시겠습니까?')) return;
        await deleteDoc(doc(db,'qna',qid,'answers',aid));
        await updateDoc(doc(db,'qna',qid), { answerCount: increment(-1) });
        await loadQna(true);
    };

    window.toggleLikeQna = async function(id) {
        const user = getUser();
        if (!user) { window.showAuthModal(); return; }
        const ref = doc(db,'qna',id);
        const snap = await getDoc(ref);
        const liked = snap.data().likedBy?.includes(user.uid);
        await updateDoc(ref, {
            likes: increment(liked ? -1 : 1),
            likedBy: liked ? arrayRemove(user.uid) : arrayUnion(user.uid)
        });
        loadQna(true);
    };

    window.deleteQna = async function(id) {
        if (!confirm('삭제하시겠습니까?')) return;
        await deleteDoc(doc(db,'qna',id));
        loadQna(true);
    };

    document.getElementById('qna-load-more').addEventListener('click', () => loadQna(false));

    // ══════════════════════════════════════════════════════════
    // 신고
    // ══════════════════════════════════════════════════════════
    window.reportPost = async function(col, id) {
        const user = getUser();
        if (!user) { window.showAuthModal(); return; }
        if (!confirm('이 글을 신고하시겠습니까?')) return;
        await updateDoc(doc(db, col, id), { reportCount: increment(1) });
        alert('신고가 접수되었습니다. 검토 후 조치하겠습니다.');
        col === 'guestbook' ? loadGb(true) : loadQna(true);
    };

    // ══════════════════════════════════════════════════════════
    // 알림
    // ══════════════════════════════════════════════════════════
    async function sendNotification(toUid, data) {
        try {
            await addDoc(collection(db,'notifications',toUid,'items'), {
                ...data, read: false, createdAt: serverTimestamp()
            });
        } catch(e) { console.warn('Notification error:', e); }
    }

    async function loadNotifications() {
        const user = getUser();
        if (!user || user.uid.startsWith('kakao_')) return;
        const panel = document.getElementById('notif-panel');
        try {
            const snap = await getDocs(query(
                collection(db,'notifications',user.uid,'items'),
                orderBy('createdAt','desc'), limit(10)
            ));
            if (snap.empty) { panel.style.display = 'none'; return; }
            panel.style.display = '';
            panel.innerHTML = `
                <div class="notif-panel">
                    <div style="font-size:0.78rem;font-weight:800;color:var(--text-muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:10px;">
                        🔔 내 알림
                    </div>
                    ${snap.docs.map(d => {
                        const n = d.data();
                        return `<div class="notif-item ${n.read ? '' : 'unread'}">
                            ${!n.read ? '<div class="notif-dot"></div>' : '<div style="width:8px;"></div>'}
                            <div>
                                <span style="font-weight:700;">${esc(n.fromName)}</span>님이 내 질문에 답변했습니다.<br>
                                <span style="color:var(--text-muted);font-size:0.8rem;">"${esc(n.questionText||'')}..."</span>
                            </div>
                        </div>`;
                    }).join('')}
                </div>`;
        } catch(e) { panel.style.display = 'none'; }
    }

    async function markNotifsRead() {
        const user = getUser();
        if (!user || user.uid.startsWith('kakao_')) return;
        document.getElementById('notif-badge').style.display = 'none';
        try {
            const snap = await getDocs(query(
                collection(db,'notifications',user.uid,'items'),
                where('read','==',false)
            ));
            snap.docs.forEach(d => updateDoc(d.ref, { read: true }).catch(()=>{}));
        } catch(e) {}
    }

    async function checkUnreadNotifs(user) {
        if (!user || user.uid.startsWith('kakao_')) return;
        try {
            const snap = await getDocs(query(
                collection(db,'notifications',user.uid,'items'),
                where('read','==',false), limit(1)
            ));
            const badge = document.getElementById('notif-badge');
            if (!snap.empty) { badge.textContent = 'N'; badge.style.display = ''; }
        } catch(e) {}
    }

    // ══════════════════════════════════════════════════════════
    // 초기화
    // ══════════════════════════════════════════════════════════
    function init(user) {
        renderGbWriteArea(user);
        renderQnaWriteArea(user);
        loadGb(true);
        loadQna(true);
        if (user) checkUnreadNotifs(user);
    }

    // 로그인 상태 변경 감지
    onUserChange((user) => {
        init(user);
        if (curTab === 'qna' && user) { loadNotifications(); markNotifsRead(); }
    });

    // 첫 로드
    const initUser = getUser();
    init(initUser);
    </script>
    <script src="cookie-consent.js"></script>
</body>
</html>
